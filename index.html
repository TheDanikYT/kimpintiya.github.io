<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Кимпиньтяо</title>
    <!-- Firebase SDK (compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6px;
            transition: background 0.3s;
        }

        body.theme-dark { background: #0f172a; }
        body.theme-dark .app-container { background: rgba(30, 41, 59, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        body.theme-light { background: #e2e8f0; }
        body.theme-light .app-container { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(0, 0, 0, 0.1); }
        body.theme-gradient { background: linear-gradient(145deg, #1e293b, #0f172a); }
        body.theme-gradient .app-container { background: linear-gradient(145deg, #1e293b, #0f172a); border: 1px solid #475569; }

        .app-container {
            width: 100%;
            max-width: 480px;
            height: 96vh;
            border-radius: 36px;
            box-shadow: 0 25px 50px -12px black;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Экран входа */
        .auth-screen {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #1e293b, #0f172a);
            padding: 20px;
        }
        .auth-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 40px 24px;
            border-radius: 48px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .auth-box h1 {
            font-size: 2.8rem;
            font-weight: 800;
            text-align: center;
            background: linear-gradient(135deg, #a5f3fc, #bae6fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .auth-input {
            width: 100%;
            padding: 16px 20px;
            border: none;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
            margin-bottom: 12px;
            outline: none;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .auth-buttons {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        .auth-btn {
            flex: 1;
            background: linear-gradient(145deg, #38bdf8, #0284c7);
            border: none;
            color: white;
            font-weight: 600;
            padding: 14px;
            border-radius: 30px;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 5px 0 #0c4a6e;
            transition: 0.1s;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .auth-btn.secondary {
            background: linear-gradient(145deg, #475569, #334155);
            box-shadow: 0 5px 0 #1e293b;
        }
        .auth-btn:active { transform: translateY(4px); box-shadow: 0 1px 0 #0c4a6e; }
        .error-message {
            color: #f87171;
            font-size: 0.9rem;
            margin-top: 12px;
            text-align: center;
        }

        /* Основной интерфейс */
        .chat-app {
            height: 100%;
            display: flex;
            flex-direction: column;
            background: transparent;
        }
        .chat-header {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .app-name {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #a5f3fc, #bae6fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-right: auto;
        }
        .current-user {
            background: rgba(255,255,255,0.1);
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: 600;
            color: #dbe9ff;
            font-size: 0.9rem;
            border: 1px solid rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .verified-badge {
            background: #38bdf8;
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-left: 4px;
        }
        .online-dot {
            width: 8px;
            height: 8px;
            background: #2ecc71;
            border-radius: 50%;
            margin-left: 4px;
        }
        .icon-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: #e2e8f0;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.15);
            flex-shrink: 0;
            position: relative;
        }
        .icon-btn:active { background: rgba(255,255,255,0.2); }
        .badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ef4444;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #1e293b;
        }

        /* Табы */
        .tabs {
            display: flex;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 6px 6px;
            gap: 4px;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 10px 0;
            font-size: 1.3rem;
            color: #94a3b8;
            border-radius: 40px;
            cursor: pointer;
        }
        .tab.active {
            background: rgba(255,255,255,0.15);
            color: #38bdf8;
        }

        /* Контейнер контента */
        .tab-content {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scrollbar-width: thin;
        }

        /* Сообщения */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 8px 4px;
        }
        .message {
            max-width: 85%;
            padding: 10px 16px;
            border-radius: 24px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.1);
            color: #f1f5f9;
            align-self: flex-start;
            animation: fade 0.2s;
        }
        .message.out {
            align-self: flex-end;
            background: linear-gradient(145deg, #38bdf8, #0284c7);
        }
        .message .sender {
            font-size: 0.75rem;
            color: #bae6fd;
            font-weight: 600;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .message-image {
            max-width: 180px;
            border-radius: 16px;
            margin-top: 5px;
        }
        .message-audio {
            max-width: 200px;
            height: 40px;
            margin-top: 5px;
            border-radius: 20px;
        }
        .invite-message {
            background: linear-gradient(145deg, #38bdf8, #0284c7);
            padding: 12px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }
        .join-btn {
            background: white;
            color: #0284c7;
            border: none;
            padding: 6px 16px;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
        }

        /* Панель ввода */
        .input-area {
            display: flex;
            gap: 6px;
            align-items: center;
            padding: 8px 10px;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.1);
            flex-wrap: wrap;
        }
        .input-area input {
            flex: 1 1 150px;
            min-width: 120px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 40px;
            padding: 12px 16px;
            color: white;
            font-size: 1rem;
            outline: none;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .action-btn-group {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .circle-btn {
            background: rgba(255,255,255,0.1);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            border: 1px solid rgba(255,255,255,0.2);
            color: #e2e8f0;
            flex-shrink: 0;
            cursor: pointer;
        }
        .circle-btn:active { background: rgba(255,255,255,0.2); }
        #send-btn, #pm-send, #chat-send {
            background: linear-gradient(145deg, #38bdf8, #0284c7);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            color: white;
            font-size: 1.4rem;
            box-shadow: 0 5px 0 #0c4a6e;
            flex-shrink: 0;
            cursor: pointer;
        }
        #send-btn:active, #pm-send:active, #chat-send:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #0c4a6e;
        }

        /* Профили, посты */
        .profile-card, .post-card, .settings-card {
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        /* Рамки аватарки */
        .avatar-wrapper {
            position: relative;
            display: inline-block;
        }
        .avatar-large {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
        }
        .avatar-placeholder {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: linear-gradient(145deg, #475569, #1e293b);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            color: white;
            cursor: pointer;
        }
        .frame-1 { border: 4px solid #fbbf24; box-shadow: 0 0 0 4px #f59e0b; }
        .frame-2 { border: 4px solid #a78bfa; box-shadow: 0 0 0 4px #8b5cf6; }
        .frame-3 { border: 4px solid #ec489a; box-shadow: 0 0 0 4px #db2777; }
        .frame-4 { border: 4px solid #14b8a6; box-shadow: 0 0 0 4px #0d9488, 0 0 0 8px #2dd4bf; }
        .profile-banner {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 24px;
            margin-bottom: 12px;
            cursor: pointer;
            background: #334155;
        }
        .profile-name {
            font-size: 1.8rem;
            color: white;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .profile-bio { color: #cbd5e1; }
        .stat-value { font-size: 1.4rem; color: #38bdf8; }
        .action-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 10px 18px;
            border-radius: 40px;
            cursor: pointer;
            margin: 4px;
        }
        .action-btn:active { background: rgba(255,255,255,0.2); }
        .admin-btn {
            background: #fbbf24;
            color: #0f172a;
            border: none;
        }

        /* Комментарии */
        .comment {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 8px 12px;
            margin-top: 8px;
            font-size: 0.9rem;
        }
        .comment-author {
            font-weight: 600;
            color: #38bdf8;
        }
        .comment-text {
            color: #e2e8f0;
        }
        .comment-time {
            font-size: 0.7rem;
            color: #94a3b8;
            margin-left: 8px;
        }
        .comments-section {
            margin-top: 12px;
        }
        .toggle-comments {
            background: none;
            border: none;
            color: #38bdf8;
            cursor: pointer;
            font-size: 0.9rem;
            padding: 4px 0;
        }

        /* Диалоги */
        .dialog-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: rgba(255,255,255,0.07);
            border-radius: 30px;
            margin-bottom: 6px;
            cursor: pointer;
        }

        /* Поиск */
        .search-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        .search-input {
            flex: 1;
            padding: 12px 18px;
            border-radius: 40px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
        }

        /* Хештеги */
        .hashtag {
            color: #38bdf8;
            font-weight: 600;
        }

        /* Модалки */
        .game-modal, .call-modal, .notifications-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(15px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
        }
        .game-card, .notifications-card {
            background: rgba(255,255,255,0.1);
            border-radius: 48px;
            padding: 25px;
            width: 100%;
            max-width: 340px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin: 15px 0;
        }
        .cell {
            aspect-ratio: 1;
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: #38bdf8;
            border: 2px solid rgba(255,255,255,0.2);
            cursor: pointer;
        }
        .hidden { display: none !important; }

        @media (max-width: 400px) {
            .app-name { font-size: 1.5rem; }
            .circle-btn { width: 38px; height: 38px; font-size: 1.3rem; }
            #send-btn, #pm-send, #chat-send { width: 42px; height: 42px; font-size: 1.3rem; }
            .input-area input { font-size: 0.85rem; padding: 10px 12px; }
            .action-btn-group { gap: 2px; }
        }
        @media (max-width: 340px) {
            .input-area { flex-direction: column; align-items: stretch; }
            .action-btn-group { justify-content: center; }
        }
    </style>
</head>
<body class="theme-dark">
<div class="app-container">
    <!-- Экран входа -->
    <div id="auth-screen" class="auth-screen">
        <div class="auth-box">
            <h1>Кимпиньтяо</h1>
            <input type="text" id="login-username" class="auth-input" placeholder="Имя">
            <input type="password" id="login-password" class="auth-input" placeholder="Пароль">
            <div class="auth-buttons">
                <button id="login-btn" class="auth-btn">Войти</button>
                <button id="register-btn" class="auth-btn secondary">Регистрация</button>
            </div>
            <div id="auth-error" class="error-message"></div>
            <div id="firebase-status" style="color:#fbbf24; font-size:0.8rem; text-align:center; margin-top:8px;"></div>
        </div>
    </div>

    <!-- Главное приложение -->
    <div id="chat-app" class="chat-app hidden">
        <div class="chat-header">
            <span class="app-name">Кимпиньтяо</span>
            <span class="current-user" id="current-user-display"></span>
            <button class="icon-btn" id="notifications-btn" title="Уведомления">
                🔔
                <span id="notifications-badge" class="badge hidden">0</span>
            </button>
            <button class="icon-btn" id="logout-btn" title="Выйти">↪</button>
        </div>

        <div id="dynamic-content" class="tab-content"></div>

        <div class="tabs">
            <div class="tab active" data-tab="dialogs">💬</div>
            <div class="tab" data-tab="feed">📰</div>
            <div class="tab" data-tab="chat">🌍</div>
            <div class="tab" data-tab="profile">👤</div>
            <div class="tab" data-tab="settings">⚙️</div>
        </div>
    </div>

    <!-- Модалки -->
    <div id="game-modal" class="game-modal hidden">
        <div class="game-card">
            <div style="display:flex; justify-content:space-between;">
                <span style="color:white; font-size:2rem;">🎮</span>
                <button class="icon-btn" id="close-game" style="width:40px;height:40px;">✕</button>
            </div>
            <div id="game-status" class="game-status" style="color:white; text-align:center; margin:15px 0;">Крестики-нолики</div>
            <div class="game-board" id="game-board"></div>
            <button class="action-btn" id="reset-game" style="width:100%;">Новая игра</button>
        </div>
    </div>

    <div id="call-modal" class="call-modal hidden">
        <div class="game-card" style="max-width:400px;">
            <div style="display:flex; justify-content:space-between;">
                <span style="color:white; font-size:2rem;">📞</span>
                <button class="icon-btn" id="close-call-modal" style="width:40px;height:40px;">✕</button>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:15px 0;">
                <div style="background:#1e293b; border-radius:30px; aspect-ratio:1/1; overflow:hidden;">
                    <video id="local-video" autoplay muted playsinline style="width:100%; height:100%; object-fit:cover;"></video>
                </div>
                <div id="remote-video-container" style="background:#1e293b; border-radius:30px; display:flex; align-items:center; justify-content:center; color:#94a3b8;">👤 Ожидание...</div>
            </div>
            <div style="display:flex; gap:15px; justify-content:center;">
                <button class="circle-btn" id="toggle-video" style="width:55px;height:55px;">📹</button>
                <button class="circle-btn" id="toggle-audio" style="width:55px;height:55px;">🎤</button>
                <button class="circle-btn" id="end-call-btn" style="background:#c74b4b; width:55px;height:55px;">📴</button>
            </div>
        </div>
    </div>

    <div id="notifications-modal" class="notifications-modal hidden">
        <div class="notifications-card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <span style="color:white; font-size:1.8rem;">🔔 Уведомления</span>
                <button class="icon-btn" id="close-notifications" style="width:40px;height:40px;">✕</button>
            </div>
            <div id="notifications-list" style="color:white;"></div>
        </div>
    </div>
</div>

<script>
    // ================== НАСТРОЙКИ FIREBASE ==================
    const firebaseConfig = {
        apiKey: "AIzaSyCEjQP9pMuLnQtRug5ithfRapf6Ak3PF9k",
        authDomain: "kimpitiay.firebaseapp.com",
        databaseURL: "https://kimpitiay-default-rtdb.firebaseio.com",
        projectId: "kimpitiay",
        storageBucket: "kimpitiay.firebasestorage.app",
        messagingSenderId: "707441694222",
        appId: "1:707441694222:web:29c91b8efbf95e76f34e5f",
        measurementId: "G-D4FDE2N5Q4"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Переменные
    let firebaseAvailable = false;
    const connectedRef = db.ref('.info/connected');
    connectedRef.on('value', (snap) => {
        firebaseAvailable = snap.val() === true;
        const statusEl = document.getElementById('firebase-status');
        if (firebaseAvailable) {
            statusEl.textContent = '✅ Онлайн-режим (Firebase)';
            statusEl.style.color = '#4ade80';
        } else {
            statusEl.textContent = '❌ Нет подключения к Firebase';
            statusEl.style.color = '#f87171';
        }
    });

    // Глобальные переменные
    let currentUser = null;
    let currentUserData = null;
    let currentTheme = localStorage.getItem('kim_theme') || 'dark';
    document.body.className = `theme-${currentTheme}`;

    // Ссылки на узлы
    const usersRef = db.ref('users');
    const postsRef = db.ref('posts');
    const dialogsRef = db.ref('dialogs');
    const generalMessagesRef = db.ref('generalMessages');
    const notificationsRef = db.ref('notifications');
    const onlineRef = db.ref('online');
    const callsRef = db.ref('calls');
    const gamesRef = db.ref('games');

    // DOM элементы
    const authScreen = document.getElementById('auth-screen');
    const chatApp = document.getElementById('chat-app');
    const loginUsername = document.getElementById('login-username');
    const loginPassword = document.getElementById('login-password');
    const loginBtn = document.getElementById('login-btn');
    const registerBtn = document.getElementById('register-btn');
    const authError = document.getElementById('auth-error');
    const currentUserSpan = document.getElementById('current-user-display');
    const logoutBtn = document.getElementById('logout-btn');
    const notificationsBtn = document.getElementById('notifications-btn');
    const notificationsBadge = document.getElementById('notifications-badge');
    const notificationsModal = document.getElementById('notifications-modal');
    const closeNotifications = document.getElementById('close-notifications');
    const notificationsList = document.getElementById('notifications-list');
    const dynamicContent = document.getElementById('dynamic-content');
    const tabs = document.querySelectorAll('.tab');

    let activeTab = 'dialogs';
    let viewingProfile = null;
    let currentDialog = null;
    let selectedChatFile = null;
    let mediaRecorder = null, recordedChunks = [], recording = false;
    let localStream = null;
    let remoteStream = null;
    let peerConnection = null;
    let currentCallId = null;

    const gameModal = document.getElementById('game-modal');
    const callModal = document.getElementById('call-modal');
    let currentGameId = null;
    let gameListener = null;

    // ================== ВСПОМОГАТЕЛЬНЫЕ ==================
    function escapeHtml(unsafe) {
        if (!unsafe) return '';
        return unsafe.replace(/[&<>"]/g, m => {
            if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;'; if(m === '"') return '&quot;';
            return m;
        });
    }
    function timeAgo(timestamp) {
        const diff = Date.now() - timestamp;
        if (diff < 60000) return 'только что';
        if (diff < 3600000) return Math.floor(diff/60000)+' мин назад';
        if (diff < 86400000) return Math.floor(diff/3600000)+' ч назад';
        return new Date(timestamp).toLocaleDateString();
    }

    function renderAvatar(username, size = 40, isSmall = true) {
        const frameClass = getAvatarFrameClass(username);
        return `<div class="avatar-wrapper" style="width:${size}px; height:${size}px; border-radius:50%; overflow:hidden; ${frameClass ? `border: 3px solid ${frameClass.borderColor}; box-shadow: ${frameClass.boxShadow}` : ''}">
                    <div style="width:100%; height:100%; background:linear-gradient(145deg,#475569,#1e293b); display:flex; align-items:center; justify-content:center; color:white; font-size:${size*0.4}px;">${username.charAt(0).toUpperCase()}</div>
                </div>`;
    }

    function getAvatarFrameClass(username) {
        if (!currentUserData) return null;
        const frames = currentUserData.unlockedFrames || [];
        const currentFrame = currentUserData.currentFrame;
        if (currentFrame && frames.includes(currentFrame)) {
            const colors = {
                1: { borderColor: '#fbbf24', boxShadow: '0 0 0 3px #f59e0b' },
                2: { borderColor: '#a78bfa', boxShadow: '0 0 0 3px #8b5cf6' },
                3: { borderColor: '#ec489a', boxShadow: '0 0 0 3px #db2777' },
                4: { borderColor: '#14b8a6', boxShadow: '0 0 0 3px #0d9488, 0 0 0 6px #2dd4bf' }
            };
            return colors[currentFrame];
        }
        return null;
    }

    function renderDisplayName(username) {
        return `<span>${escapeHtml(username)}${currentUserData && currentUserData.verified ? '<span class="verified-badge">✓</span>' : ''}</span>`;
    }

    function checkFirebaseOrShowError() {
        if (!firebaseAvailable) {
            alert('Нет подключения к Firebase. Проверьте интернет.');
            return false;
        }
        return true;
    }

    // ================== ОТСЛЕЖИВАНИЕ ВРЕМЕНИ ОНЛАЙН ==================
    let onlineStartTime = null;
    async function startOnlineTracking() {
        if (!currentUser) return;
        const now = Date.now();
        onlineStartTime = now;
        // При выходе или закрытии страницы сохраняем накопленное время
        window.addEventListener('beforeunload', () => saveOnlineTime());
        // onDisconnect: при отключении сохраняем
        const onlineRefUser = onlineRef.child(currentUser);
        onlineRefUser.onDisconnect().set(null);
        // Принудительно сохраняем каждую минуту
        setInterval(() => saveOnlineTime(), 60000);
    }

    async function saveOnlineTime() {
        if (!currentUser || !onlineStartTime) return;
        const elapsed = Date.now() - onlineStartTime;
        if (elapsed < 1000) return;
        const userSnap = await usersRef.child(currentUser).once('value');
        const user = userSnap.val();
        let totalTime = (user.totalOnlineTime || 0) + elapsed;
        await usersRef.child(currentUser).child('totalOnlineTime').set(totalTime);
        onlineStartTime = Date.now();
        // Проверяем открытие рамок
        await checkAndUnlockFrames(totalTime);
    }

    async function checkAndUnlockFrames(totalTime) {
        const hours = totalTime / (1000 * 3600);
        const frames = [];
        if (hours >= 5) frames.push(1);
        if (hours >= 24) frames.push(2);
        if (hours >= 50) frames.push(3);
        if (hours >= 100) frames.push(4);
        const currentFrames = currentUserData.unlockedFrames || [];
        const newFrames = frames.filter(f => !currentFrames.includes(f));
        if (newFrames.length) {
            await usersRef.child(currentUser).child('unlockedFrames').set([...currentFrames, ...newFrames]);
            currentUserData.unlockedFrames = [...currentFrames, ...newFrames];
            // Выдать последнюю открытую рамку как текущую
            if (newFrames.includes(4)) await usersRef.child(currentUser).child('currentFrame').set(4);
            else if (newFrames.includes(3)) await usersRef.child(currentUser).child('currentFrame').set(3);
            else if (newFrames.includes(2)) await usersRef.child(currentUser).child('currentFrame').set(2);
            else if (newFrames.includes(1)) await usersRef.child(currentUser).child('currentFrame').set(1);
            addNotification(currentUser, { type: 'frame', text: `Вы открыли новую рамку #${newFrames[newFrames.length-1]}!` });
        }
    }

    // ================== АВТОРИЗАЦИЯ ==================
    function showAuthError(msg) { authError.textContent = msg; }

    async function login(username, password) {
        if (!checkFirebaseOrShowError()) return;
        if (!username || !password) { showAuthError('Заполните поля'); return; }
        try {
            const snapshot = await usersRef.child(username).once('value');
            const user = snapshot.val();
            if (!user) { showAuthError('Пользователь не найден'); return; }
            if (user.password !== password) { showAuthError('Неверный пароль'); return; }
            currentUser = username;
            currentUserData = user;
            localStorage.setItem('kim_current_user', username);
            authScreen.classList.add('hidden');
            chatApp.classList.remove('hidden');
            currentUserSpan.innerHTML = renderDisplayName(username);
            onlineRef.child(username).set(true);
            onlineRef.child(username).onDisconnect().remove();
            startOnlineTracking();
            activeTab = 'dialogs';
            renderTab();
            subscribeToNotifications();
        } catch (e) {
            showAuthError('Ошибка при входе: ' + e.message);
        }
    }

    async function register(username, password) {
        if (!checkFirebaseOrShowError()) return;
        if (!username || !password) { showAuthError('Заполните поля'); return; }
        if (username === 'Alochnost') {
            showAuthError('Имя Alochnost зарезервировано');
            return;
        }
        try {
            const snapshot = await usersRef.child(username).once('value');
            if (snapshot.exists()) { showAuthError('Имя уже занято'); return; }
            const newUser = {
                password: password,
                avatar: null,
                banner: null,
                bio: '',
                friends: [],
                followers: [],
                following: [],
                verified: false,
                isAdmin: false,
                totalOnlineTime: 0,
                unlockedFrames: [],
                currentFrame: null,
                pinnedPost: null
            };
            await usersRef.child(username).set(newUser);
            showAuthError('✅ Регистрация успешна! Теперь войдите.');
        } catch (e) {
            showAuthError('Ошибка регистрации: ' + e.message);
        }
    }

    async function addNotification(username, notif) {
        const newNotif = { id: Date.now() + Math.random(), ...notif, read: false, timestamp: Date.now() };
        await notificationsRef.child(username).push(newNotif);
    }

    async function markNotificationsAsRead() {
        if (!currentUser) return;
        const snapshot = await notificationsRef.child(currentUser).once('value');
        const notifs = snapshot.val() || {};
        const updates = {};
        Object.keys(notifs).forEach(key => {
            if (!notifs[key].read) updates[`${key}/read`] = true;
        });
        if (Object.keys(updates).length) await notificationsRef.child(currentUser).update(updates);
    }

    function subscribeToNotifications() {
        if (!currentUser) return;
        notificationsRef.child(currentUser).on('value', (snap) => {
            const notifs = snap.val() || {};
            const unread = Object.values(notifs).filter(n => !n.read).length;
            if (unread > 0) {
                notificationsBadge.textContent = unread;
                notificationsBadge.classList.remove('hidden');
            } else {
                notificationsBadge.classList.add('hidden');
            }
        });
    }

    function renderMessageHtml(msg, isOut) {

        html += `</div>`;

    function handlePMFile(e, other) {
        const file = e.target.files[0];
        if (!file) return;
        if (file.size > 5*1024*1024) { alert('Макс 5 МБ'); e.target.value = ''; return; }
        const reader = new FileReader();
        reader.onload = (ev) => {
            const key = [currentUser, other].sort().join('_');
            const type = e.target.id.includes('image') ? 'image' : 'audio';
            const msg = { sender: currentUser, timestamp: Date.now() };
            if (type === 'image') msg.imageUrl = ev.target.result;
            else msg.audioUrl = ev.target.result;
            dialogsRef.child(key).push(msg);
            renderPrivateChat(other);
        };
        reader.readAsDataURL(file);
    }

    let pmRecordingStream = null;
    async function startPMRecording(other) {
        if (recording) return;
        try {
            pmRecordingStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(pmRecordingStream);
            recordedChunks = [];
            mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'audio/webm' });
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const key = [currentUser, other].sort().join('_');
                    const msg = { sender: currentUser, audioUrl: ev.target.result, timestamp: Date.now() };
                    dialogsRef.child(key).push(msg);
                    renderPrivateChat(other);
                    pmRecordingStream.getTracks().forEach(t => t.stop());
                };
                reader.readAsDataURL(blob);
            };
            mediaRecorder.start();
            recording = true;
            document.getElementById('pm-record').style.background = '#c74b4b';
        } catch (err) { alert('Микрофон недоступен'); }
    }
    function stopPMRecording() {
        if (mediaRecorder && recording) {
            mediaRecorder.stop();
            recording = false;
            if (document.getElementById('pm-record')) document.getElementById('pm-record').style.background = '';
        }
    }

    function handleGeneralFile(e) {
        const file = e.target.files[0];
        if (!file) return;
        if (file.size > 5*1024*1024) { alert('Макс 5 МБ'); e.target.value = ''; return; }
        const reader = new FileReader();
        reader.onload = (ev) => {
            const type = e.target.id.includes('image') ? 'image' : 'audio';
            const msg = { sender: currentUser, timestamp: Date.now() };
            if (type === 'image') msg.imageUrl = ev.target.result;
            else msg.audioUrl = ev.target.result;
            generalMessagesRef.push(msg);
            renderGeneralChat();
        };
        reader.readAsDataURL(file);
    }

    let generalRecordingStream = null;
    async function startGeneralRecording() {
        if (recording) return;
        try {
            generalRecordingStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(generalRecordingStream);
            recordedChunks = [];
            mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'audio/webm' });
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const msg = { sender: currentUser, audioUrl: ev.target.result, timestamp: Date.now() };
                    generalMessagesRef.push(msg);
                    renderGeneralChat();
                    generalRecordingStream.getTracks().forEach(t => t.stop());
                };
                reader.readAsDataURL(blob);
            };
            mediaRecorder.start();
            recording = true;
            document.getElementById('chat-record').style.background = '#c74b4b';
        } catch (err) { alert('Микрофон недоступен'); }
    }
    function stopGeneralRecording() {
        if (mediaRecorder && recording) {
            mediaRecorder.stop();
            recording = false;
            if (document.getElementById('chat-record')) document.getElementById('chat-record').style.background = '';
        }
    }

    // ================== ЗВОНКИ (WebRTC) ==================
    async function startCall(callId, targetUser) {
        if (peerConnection) peerConnection.close();
        currentCallId = callId;
        const configuration = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
        peerConnection = new RTCPeerConnection(configuration);

        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById('local-video').srcObject = localStream;
        localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

        peerConnection.ontrack = event => {
            const remoteVideo = document.createElement('video');
            remoteVideo.autoplay = true;
            remoteVideo.playsInline = true;
            remoteVideo.srcObject = event.streams[0];
            const container = document.getElementById('remote-video-container');
            container.innerHTML = '';
            container.appendChild(remoteVideo);
            remoteVideo.style.width = '100%';
            remoteVideo.style.height = '100%';
            remoteVideo.style.objectFit = 'cover';
        };

        peerConnection.onicecandidate = event => {
            if (event.candidate) {
                callsRef.child(callId).child('candidates').push(event.candidate.toJSON());
            }
        };

        if (targetUser) {
            // Исходящий звонок: создаём offer
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            await callsRef.child(callId).set({
                from: currentUser,
                to: targetUser,
                offer: offer,
                status: 'pending'
            });
        } else {
            // Общий чат: ждём, когда кто-то присоединится
            callsRef.child(callId).set({
                from: currentUser,
                to: null,
                status: 'waiting'
            });
        }

        // Слушаем ответы
        const callRef = callsRef.child(callId);
        callRef.on('value', async (snap) => {
            const data = snap.val();
            if (!data) return;
            if (data.status === 'accepted' && data.answer && peerConnection.signalingState !== 'stable') {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
            } else if (data.offer && data.to === currentUser && peerConnection.signalingState === 'stable') {
                // Входящий звонок
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                await callRef.child('answer').set(answer);
                await callRef.child('status').set('accepted');
            }
            // ICE кандидаты
            if (data.candidates) {
                Object.values(data.candidates).forEach(candidate => {
                    peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
                });
            }
        });
    }

    async function endCall() {
        if (peerConnection) {
            peerConnection.close();
            peerConnection = null;
        }
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
            localStream = null;
        }
        if (currentCallId) {
            await callsRef.child(currentCallId).remove();
            currentCallId = null;
        }
        callModal.classList.add('hidden');
    }

        }
    });
    document.getElementById('toggle-audio').addEventListener('click', () => {

        }
    });
    document.getElementById('close-call-modal').addEventListener('click', endCall);
    document.getElementById('end-call-btn').addEventListener('click', endCall);

    async function joinGame(gameId) {
        currentGameId = gameId;
        gameModal.classList.remove('hidden');
        if (currentGameListener) currentGameListener();
        const gameRef = gamesRef.child(gameId);
        const snap = await gameRef.once('value');
        const game = snap.val();
        if (!game) return;

        // Если второй игрок
        if (game.players[1] === null && game.players[0] !== currentUser) {
            await gameRef.child('players').child('1').set(currentUser);
            await gameRef.child('status').set('playing');
        }
        currentGameListener = gameRef.on('value', (snap) => {
            const gameData = snap.val();
            if (gameData) renderGameBoard(gameData);
        });
    }

    function renderGameBoard(game) {
        const boardDiv = document.getElementById('game-board');
        let html = '';
        for (let i = 0; i < 9; i++) {
            html += `<div class="cell" data-index="${i}">${game.board[i]}</div>`;
        }
        boardDiv.innerHTML = html;
        const statusText = game.status === 'waiting' ? 'Ожидание игрока...' :
                           game.status === 'over' ? 'Игра окончена' :
                           `Ход: ${game.currentPlayer === currentUser ? 'Ваш ход' : 'Ход соперника'}`;
        document.getElementById('game-status').innerText = statusText;

        document.querySelectorAll('.cell').forEach(cell => {
            cell.addEventListener('click', async () => {
                if (game.status !== 'playing') return;
                if (game.currentPlayer !== currentUser) { alert('Не ваш ход'); return; }
                const idx = cell.dataset.index;
                if (game.board[idx] !== '') return;
                const newBoard = [...game.board];
                newBoard[idx] = game.turn;
                const nextTurn = game.turn === 'X' ? 'O' : 'X';
                const nextPlayer = game.players[0] === currentUser ? game.players[1] : game.players[0];
                await gamesRef.child(currentGameId).update({
                    board: newBoard,
                    turn: nextTurn,
                    currentPlayer: nextPlayer
                });
                // Проверка победы
                if (checkWin(newBoard)) {
                    await gamesRef.child(currentGameId).child('status').set('over');
                    alert(`Победил ${game.turn === 'X' ? '✖' : '◯'}!`);
                } else if (!newBoard.includes('')) {
                    await gamesRef.child(currentGameId).child('status').set('over');
                    alert('Ничья');
                }
            });
        });
    }

    function checkWin(board) {
        const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
        for (let l of lines) {
            if (board[l[0]] && board[l[0]] === board[l[1]] && board[l[1]] === board[l[2]]) return true;
        }
        return false;
    }

    function uploadMedia(type) {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*,image/gif';
        input.onchange = async (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    await usersRef.child(currentUser).child(type).set(ev.target.result);
                    renderProfile(currentUser, true);
                };
                reader.readAsDataURL(file);
            }
        };
        input.click();
    }

    // ================== НАСТРОЙКИ ==================
    function renderSettings() {
        dynamicContent.innerHTML = `
            <div class="settings-card">
                <h3 style="color:white; margin-bottom:16px;">Тема</h3>
                <div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px;">
                    <button class="theme-btn ${currentTheme==='dark'?'active':''}" data-theme="dark" style="background:${currentTheme==='dark'?'#38bdf8':'rgba(255,255,255,0.1)'}; border:none; color:white; padding:10px 18px; border-radius:40px;">Тёмная</button>
                    <button class="theme-btn ${currentTheme==='light'?'active':''}" data-theme="light" style="background:${currentTheme==='light'?'#38bdf8':'rgba(255,255,255,0.1)'}; border:none; color:white; padding:10px 18px; border-radius:40px;">Светлая</button>
                    <button class="theme-btn ${currentTheme==='gradient'?'active':''}" data-theme="gradient" style="background:${currentTheme==='gradient'?'#38bdf8':'rgba(255,255,255,0.1)'}; border:none; color:white; padding:10px 18px; border-radius:40px;">Градиент</button>
                </div>
                <h3 style="color:white; margin-bottom:16px;">Безопасность</h3>
                <div style="background:rgba(255,255,255,0.05); border-radius:24px; padding:16px;">
                    <input type="password" id="old-password" class="auth-input" placeholder="Старый пароль">
                    <input type="password" id="new-password" class="auth-input" placeholder="Новый пароль">
                    <input type="password" id="confirm-password" class="auth-input" placeholder="Подтвердите">
                    <button class="action-btn" id="change-password-btn" style="width:100%;">Сменить пароль</button>
                    <div id="password-change-message" style="color:#94a3b8; font-size:0.9rem; margin-top:8px;"></div>
                </div>
            </div>
        `;
        document.querySelectorAll('.theme-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                currentTheme = btn.dataset.theme;
                document.body.className = `theme-${currentTheme}`;
                localStorage.setItem('kim_theme', currentTheme);
                renderSettings();
            });
        });

        document.getElementById('change-password-btn').addEventListener('click', async () => {
            const old = document.getElementById('old-password').value.trim();
            const nw = document.getElementById('new-password').value.trim();
            const conf = document.getElementById('confirm-password').value.trim();
            const msg = document.getElementById('password-change-message');
            if (!old || !nw || !conf) { msg.textContent = 'Заполните все поля'; msg.style.color = '#f87171'; return; }
            if (nw !== conf) { msg.textContent = 'Новый пароль и подтверждение не совпадают'; msg.style.color = '#f87171'; return; }
            if (currentUserData.password !== old) { msg.textContent = 'Неверный старый пароль'; msg.style.color = '#f87171'; return; }
            await usersRef.child(currentUser).child('password').set(nw);
            msg.textContent = '✅ Пароль изменён'; msg.style.color = '#4ade80';
            document.getElementById('old-password').value = '';
            document.getElementById('new-password').value = '';
            document.getElementById('confirm-password').value = '';
        });
    }

    // Обработка нажатий на кнопки приглашений (делегирование)
    dynamicContent.addEventListener('click', async (e) => {
        if (e.target.classList.contains('join-btn')) {
            const gameId = e.target.dataset.gameid;
            const callId = e.target.dataset.callid;
            if (gameId) {
                await joinGame(gameId);
            } else if (callId) {
                await startCall(callId, null);
                callModal.classList.remove('hidden');
            }
        }
    });
</script>
</body>
</html>
