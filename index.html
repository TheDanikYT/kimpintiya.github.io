<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Кимпиньтяо</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <style>
        /* ========== ПОЛНЫЙ ДИЗАЙН ========== */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6px;
            transition: background 0.3s;
        }
        body.theme-dark { background: #0f172a; }
        body.theme-dark .app-container { background: rgba(30, 41, 59, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        body.theme-light { background: #e2e8f0; }
        body.theme-light .app-container { background: rgba(255,255,255,0.8); backdrop-filter: blur(20px); border: 1px solid rgba(0,0,0,0.1); }
        body.theme-gradient { background: linear-gradient(145deg, #1e293b, #0f172a); }
        body.theme-gradient .app-container { background: linear-gradient(145deg, #1e293b, #0f172a); border: 1px solid #475569; }
        .app-container { width: 100%; max-width: 480px; height: 96vh; border-radius: 36px; box-shadow: 0 25px 50px -12px black; overflow: hidden; display: flex; flex-direction: column; }
        .auth-screen { height: 100%; display: flex; align-items: center; justify-content: center; background: linear-gradient(145deg, #1e293b, #0f172a); padding: 20px; }
        .auth-box { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); padding: 40px 24px; border-radius: 48px; width: 100%; border: 1px solid rgba(255,255,255,0.1); }
        .auth-box h1 { font-size: 2.8rem; font-weight: 800; text-align: center; background: linear-gradient(135deg, #a5f3fc, #bae6fd); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
        .auth-input { width: 100%; padding: 16px 20px; border: none; border-radius: 30px; background: rgba(255,255,255,0.1); color: white; font-size: 1rem; margin-bottom: 12px; outline: none; border: 1px solid rgba(255,255,255,0.15); }
        .auth-buttons { display: flex; gap: 10px; margin-top: 16px; }
        .auth-btn { flex: 1; background: linear-gradient(145deg, #38bdf8, #0284c7); border: none; color: white; font-weight: 600; padding: 14px; border-radius: 30px; font-size: 1rem; cursor: pointer; box-shadow: 0 5px 0 #0c4a6e; transition: 0.1s; border: 1px solid rgba(255,255,255,0.2); }
        .auth-btn.secondary { background: linear-gradient(145deg, #475569, #334155); box-shadow: 0 5px 0 #1e293b; }
        .auth-btn:active { transform: translateY(4px); box-shadow: 0 1px 0 #0c4a6e; }
        .error-message { color: #f87171; font-size: 0.9rem; margin-top: 12px; text-align: center; }
        .chat-app { height: 100%; display: flex; flex-direction: column; background: transparent; }
        .chat-header { padding: 12px 16px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .app-name { font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, #a5f3fc, #bae6fd); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-right: auto; }
        .current-user { background: rgba(255,255,255,0.1); padding: 6px 14px; border-radius: 40px; font-weight: 600; color: #dbe9ff; font-size: 0.9rem; border: 1px solid rgba(255,255,255,0.2); display: flex; align-items: center; gap: 4px; }
        .icon-btn { background: rgba(255,255,255,0.1); border: none; color: #e2e8f0; width: 44px; height: 44px; border-radius: 50%; font-size: 1.5rem; cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.15); flex-shrink: 0; position: relative; }
        .badge { position: absolute; top: -5px; right: -5px; background: #ef4444; color: white; border-radius: 50%; width: 20px; height: 20px; font-size: 12px; display: flex; align-items: center; justify-content: center; border: 2px solid #1e293b; }
        .tabs { display: flex; background: rgba(0,0,0,0.3); backdrop-filter: blur(10px); border-top: 1px solid rgba(255,255,255,0.1); padding: 6px 6px; gap: 4px; }
        .tab { flex: 1; text-align: center; padding: 10px 0; font-size: 1.3rem; color: #94a3b8; border-radius: 40px; cursor: pointer; }
        .tab.active { background: rgba(255,255,255,0.15); color: #38bdf8; }
        .tab-content { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 12px; scrollbar-width: thin; }
        .messages-container { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding: 8px 4px; }
        .message { max-width: 85%; padding: 10px 16px; border-radius: 24px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); color: #f1f5f9; align-self: flex-start; animation: fade 0.2s; position: relative; }
        .message.out { align-self: flex-end; background: linear-gradient(145deg, #38bdf8, #0284c7); }
        .message .sender { font-size: 0.75rem; color: #bae6fd; font-weight: 600; margin-bottom: 4px; display: flex; align-items: center; gap: 4px; }
        .message-image { max-width: 180px; border-radius: 16px; margin-top: 5px; }
        .message-audio { max-width: 200px; height: 40px; margin-top: 5px; border-radius: 20px; }
        .invite-message { background: linear-gradient(145deg, #38bdf8, #0284c7); padding: 12px; border-radius: 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
        .join-btn { background: white; color: #0284c7; border: none; padding: 6px 16px; border-radius: 30px; font-weight: 700; cursor: pointer; }
        .input-area { display: flex; gap: 6px; align-items: center; padding: 8px 10px; background: rgba(0,0,0,0.3); backdrop-filter: blur(10px); border-top: 1px solid rgba(255,255,255,0.1); flex-wrap: wrap; }
        .input-area input { flex: 1 1 150px; min-width: 120px; background: rgba(255,255,255,0.1); border: none; border-radius: 40px; padding: 12px 16px; color: white; font-size: 1rem; outline: none; border: 1px solid rgba(255,255,255,0.15); }
        .action-btn-group { display: flex; gap: 4px; flex-wrap: wrap; justify-content: flex-end; }
        .circle-btn { background: rgba(255,255,255,0.1); width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; border: 1px solid rgba(255,255,255,0.2); color: #e2e8f0; flex-shrink: 0; cursor: pointer; }
        .circle-btn:active { background: rgba(255,255,255,0.2); }
        #send-btn, #pm-send, #chat-send { background: linear-gradient(145deg, #38bdf8, #0284c7); width: 44px; height: 44px; border-radius: 50%; border: none; color: white; font-size: 1.4rem; box-shadow: 0 5px 0 #0c4a6e; flex-shrink: 0; cursor: pointer; }
        .profile-card, .post-card, .settings-card { background: rgba(255,255,255,0.07); backdrop-filter: blur(10px); border-radius: 32px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .avatar-large { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; cursor: pointer; transition: 0.2s; }
        .avatar-frame-bronze { border: 4px solid #cd7f32; box-shadow: 0 0 8px #cd7f32; }
        .avatar-frame-silver { border: 4px solid #c0c0c0; box-shadow: 0 0 10px #c0c0c0; }
        .avatar-frame-gold { border: 4px solid #ffd700; box-shadow: 0 0 12px #ffd700; }
        .avatar-frame-platinum { border: 5px solid #e5e4e2; box-shadow: 0 0 15px #e5e4e2; }
        .avatar-placeholder { width: 90px; height: 90px; border-radius: 50%; background: linear-gradient(145deg,#475569,#1e293b); display: flex; align-items: center; justify-content: center; font-size: 2.8rem; color: white; cursor: pointer; }
        .profile-name { font-size: 1.8rem; color: white; display: flex; align-items: center; gap: 8px; }
        .profile-bio { color: #cbd5e1; }
        .stat-value { font-size: 1.4rem; color: #38bdf8; }
        .action-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 10px 18px; border-radius: 40px; cursor: pointer; margin: 4px; }
        .admin-btn { background: #fbbf24; color: #0f172a; border: none; }
        .comment { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 8px 12px; margin-top: 8px; font-size: 0.9rem; }
        .comment-author { font-weight: 600; color: #38bdf8; }
        .comments-section { display: none; margin-top: 12px; }
        .comments-section.show { display: block; }
        .dialog-item { display: flex; align-items: center; gap: 12px; padding: 12px; background: rgba(255,255,255,0.07); border-radius: 30px; margin-bottom: 6px; cursor: pointer; }
        .search-bar { display: flex; gap: 8px; margin-bottom: 12px; }
        .search-input { flex: 1; padding: 12px 18px; border-radius: 40px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; }
        .hashtag { color: #38bdf8; font-weight: 600; }
        .game-modal, .call-modal, .notifications-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); display: flex; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
        .game-card, .notifications-card { background: rgba(255,255,255,0.1); border-radius: 48px; padding: 25px; width: 100%; max-width: 340px; max-height: 80vh; overflow-y: auto; }
        .game-board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 15px 0; }
        .cell { aspect-ratio: 1; background: rgba(255,255,255,0.1); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; color: #38bdf8; border: 2px solid rgba(255,255,255,0.2); cursor: pointer; }
        .hidden { display: none !important; }
        .profile-banner { width: 100%; height: 120px; background-size: cover; background-position: center; border-radius: 24px; margin-bottom: 12px; background-color: #334155; cursor: pointer; }
        .frame-selector { display: flex; gap: 10px; margin: 12px 0; flex-wrap: wrap; }
        .frame-option { width: 50px; height: 50px; border-radius: 50%; cursor: pointer; background: #1e293b; border: 2px solid #fff; }
        .read-check { font-size: 12px; margin-left: 8px; opacity: 0.7; }
        .pinned-badge { background: #f59e0b; color: black; font-size: 12px; border-radius: 20px; padding: 2px 8px; margin-left: 8px; }
        @media (max-width:400px) { .app-name { font-size:1.5rem; } .circle-btn { width:38px; height:38px; } }
    </style>
</head>
<body class="theme-dark">
<div class="app-container">
    <div id="auth-screen" class="auth-screen">
        <div class="auth-box">
            <h1>Кимпиньтяо</h1>
            <input type="text" id="login-username" class="auth-input" placeholder="Имя">
            <input type="password" id="login-password" class="auth-input" placeholder="Пароль">
            <div class="auth-buttons">
                <button id="login-btn" class="auth-btn">Войти</button>
                <button id="register-btn" class="auth-btn secondary">Регистрация</button>
            </div>
            <div id="auth-error" class="error-message"></div>
        </div>
    </div>
    <div id="chat-app" class="chat-app hidden">
        <div class="chat-header">
            <span class="app-name">Кимпиньтяо</span>
            <span class="current-user" id="current-user-display"></span>
            <button class="icon-btn" id="notifications-btn">🔔<span id="notifications-badge" class="badge hidden">0</span></button>
            <button class="icon-btn" id="logout-btn">↪</button>
        </div>
        <div id="dynamic-content" class="tab-content"></div>
        <div class="tabs">
            <div class="tab active" data-tab="dialogs">💬</div>
            <div class="tab" data-tab="feed">📰</div>
            <div class="tab" data-tab="chat">🌍</div>
            <div class="tab" data-tab="profile">👤</div>
            <div class="tab" data-tab="settings">⚙️</div>
        </div>
    </div>
    <div id="game-modal" class="game-modal hidden"><div class="game-card"><div style="display:flex; justify-content:space-between;"><span style="color:white;">🎮 Игра</span><button class="icon-btn" id="close-game">✕</button></div><div id="game-status" style="color:white; text-align:center; margin:15px 0;"></div><div class="game-board" id="game-board"></div><button class="action-btn" id="reset-game">Новая игра</button></div></div>
    <div id="call-modal" class="call-modal hidden"><div class="game-card"><div style="display:flex; justify-content:space-between;"><span>📞 Звонок</span><button class="icon-btn" id="close-call-modal">✕</button></div><video id="local-video" autoplay muted playsinline style="width:100%; border-radius:20px; margin:10px 0;"></video><video id="remote-video" autoplay playsinline style="width:100%; border-radius:20px;"></video><div style="display:flex; gap:10px; justify-content:center;"><button class="circle-btn" id="toggle-video">📹</button><button class="circle-btn" id="toggle-audio">🎤</button><button class="circle-btn" id="end-call-btn" style="background:#c74b4b;">📴</button></div></div></div>
    <div id="notifications-modal" class="notifications-modal hidden"><div class="notifications-card"><div style="display:flex; justify-content:space-between;"><span>🔔 Уведомления</span><button class="icon-btn" id="close-notifications">✕</button></div><div id="notifications-list"></div></div></div>
</div>

<script>
    // Firebase config
    const firebaseConfig = {
        apiKey: "AIzaSyCEjQP9pMuLnQtRug5ithfRapf6Ak3PF9k",
        authDomain: "kimpitiay.firebaseapp.com",
        databaseURL: "https://kimpitiay-default-rtdb.firebaseio.com",
        projectId: "kimpitiay",
        storageBucket: "kimpitiay.firebasestorage.app",
        messagingSenderId: "707441694222",
        appId: "1:707441694222:web:29c91b8efbf95e76f34e5f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUser = null, currentUserData = null, currentTheme = localStorage.getItem('kim_theme') || 'dark';
    document.body.className = `theme-${currentTheme}`;

    const usersRef = db.ref('users');
    const postsRef = db.ref('posts');
    const dialogsRef = db.ref('dialogs');
    const generalMessagesRef = db.ref('generalMessages');
    const notificationsRef = db.ref('notifications');
    const gamesRef = db.ref('games');
    const callsRef = db.ref('calls');

    let activeTab = 'dialogs', viewingProfile = null, currentDialog = null;
    let localStream = null, peerConnection = null, currentCallId = null;
    let onlineInterval = null;

    // Helper functions
    function escapeHtml(s) { if(!s) return ''; return s.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
    function timeAgo(ts) { let d = Date.now()-ts; if(d<60000) return 'только что'; if(d<3600000) return Math.floor(d/60000)+' мин'; if(d<86400000) return Math.floor(d/3600000)+' ч'; return new Date(ts).toLocaleDateString(); }
    async function addNotification(user, notif) { await notificationsRef.child(user).push({ ...notif, timestamp: Date.now(), read: false }); }
    function getAvatarFrameClass(userData) { let frame = userData?.activeFrame || 'none'; if(frame==='bronze') return 'avatar-frame-bronze'; if(frame==='silver') return 'avatar-frame-silver'; if(frame==='gold') return 'avatar-frame-gold'; if(frame==='platinum') return 'avatar-frame-platinum'; return ''; }

    // Authentication
    async function login(username, password) {
        if(!username || !password) { document.getElementById('auth-error').textContent = 'Заполните поля'; return; }
        try {
            let snap = await usersRef.child(username).once('value');
            let user = snap.val();
            if(!user || user.password !== password) { document.getElementById('auth-error').textContent = 'Неверные данные'; return; }
            currentUser = username;
            currentUserData = user;
            localStorage.setItem('kim_current_user', username);
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('chat-app').classList.remove('hidden');
            document.getElementById('current-user-display').innerHTML = escapeHtml(username);
            await db.ref('online/'+username).set(true);
            db.ref('online/'+username).onDisconnect().remove();
            startOnlineCounter();
            renderTab();
            subscribeToNotifications();
        } catch(e) { document.getElementById('auth-error').textContent = 'Ошибка: '+e.message; }
    }
    async function register(username, password) {
        if(!username || !password) { document.getElementById('auth-error').textContent = 'Заполните поля'; return; }
        let snap = await usersRef.child(username).once('value');
        if(snap.exists()) { document.getElementById('auth-error').textContent = 'Имя занято'; return; }
        let newUser = { password, avatar: null, bio: '', friends: [], followers: [], following: [], verified: false, isAdmin: false, onlineTime: 0, frames: [], activeFrame: 'none', banner: null };
        await usersRef.child(username).set(newUser);
        document.getElementById('auth-error').textContent = '✅ Регистрация успешна! Войдите.';
    }
    document.getElementById('login-btn').onclick = () => login(document.getElementById('login-username').value.trim(), document.getElementById('login-password').value.trim());
    document.getElementById('register-btn').onclick = () => register(document.getElementById('login-username').value.trim(), document.getElementById('login-password').value.trim());
    document.getElementById('logout-btn').onclick = async () => { if(currentUser) { await db.ref('online/'+currentUser).remove(); if(localStream) localStream.getTracks().forEach(t=>t.stop()); if(peerConnection) peerConnection.close(); currentUser=null; localStorage.removeItem('kim_current_user'); document.getElementById('auth-screen').classList.remove('hidden'); document.getElementById('chat-app').classList.add('hidden'); if(onlineInterval) clearInterval(onlineInterval); } };
    (async function() { let saved = localStorage.getItem('kim_current_user'); if(saved) { let snap = await usersRef.child(saved).once('value'); if(snap.exists()) { currentUser=saved; currentUserData=snap.val(); document.getElementById('auth-screen').classList.add('hidden'); document.getElementById('chat-app').classList.remove('hidden'); document.getElementById('current-user-display').innerHTML=escapeHtml(saved); await db.ref('online/'+saved).set(true); db.ref('online/'+saved).onDisconnect().remove(); startOnlineCounter(); renderTab(); subscribeToNotifications(); } } })();

    // Online counter for frames
    function startOnlineCounter() {
        if(onlineInterval) clearInterval(onlineInterval);
        onlineInterval = setInterval(async () => {
            if(!currentUser) return;
            let snap = await usersRef.child(currentUser).once('value');
            let user = snap.val();
            let onlineSec = (user.onlineTime||0) + 60;
            await usersRef.child(currentUser).child('onlineTime').set(onlineSec);
            let frames = user.frames || [];
            if(onlineSec >= 5*3600 && !frames.includes('bronze')) { frames.push('bronze'); await usersRef.child(currentUser).child('frames').set(frames); await addNotification(currentUser, {type:'frame', text:'🎉 Получена бронзовая рамка за 5 часов онлайн!'}); }
            if(onlineSec >= 24*3600 && !frames.includes('silver')) { frames.push('silver'); await usersRef.child(currentUser).child('frames').set(frames); await addNotification(currentUser, {type:'frame', text:'🎉 Серебряная рамка за 24 часа!'}); }
            if(onlineSec >= 50*3600 && !frames.includes('gold')) { frames.push('gold'); await usersRef.child(currentUser).child('frames').set(frames); await addNotification(currentUser, {type:'frame', text:'🎉 Золотая рамка за 50 часов!'}); }
            if(onlineSec >= 100*3600 && !frames.includes('platinum')) { frames.push('platinum'); await usersRef.child(currentUser).child('frames').set(frames); await addNotification(currentUser, {type:'frame', text:'🎉 Платиновая рамка за 100 часов!'}); }
        }, 60000);
    }

    // Notifications
    function subscribeToNotifications() { if(!currentUser) return; notificationsRef.child(currentUser).on('value', snap => { let notifs=snap.val()||{}; let unread=Object.values(notifs).filter(n=>!n.read).length; let badge=document.getElementById('notifications-badge'); if(unread>0) { badge.textContent=unread; badge.classList.remove('hidden'); } else badge.classList.add('hidden'); }); }
    document.getElementById('notifications-btn').onclick = async () => { await renderNotificationsModal(); document.getElementById('notifications-modal').classList.remove('hidden'); };
    document.getElementById('close-notifications').onclick = () => document.getElementById('notifications-modal').classList.add('hidden');
    async function renderNotificationsModal() { let snap = await notificationsRef.child(currentUser).once('value'); let notifs=snap.val()||{}; let sorted=Object.values(notifs).sort((a,b)=>b.timestamp-a.timestamp); let html=''; for(let n of sorted) html+=`<div style="background:rgba(255,255,255,0.1); border-radius:20px; padding:12px; margin-bottom:8px;"><div>${n.text}</div><div style="color:#94a3b8; font-size:0.8rem;">${timeAgo(n.timestamp)}</div></div>`; document.getElementById('notifications-list').innerHTML=html||'<p>Нет уведомлений</p>'; await notificationsRef.child(currentUser).update({}); }

    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => { tab.onclick = () => { document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); tab.classList.add('active'); activeTab=tab.dataset.tab; viewingProfile=null; currentDialog=null; renderTab(); }; });
    function renderTab() { if(!currentUser) return; if(activeTab==='dialogs') renderDialogsList(); else if(activeTab==='feed') renderFeed(); else if(activeTab==='chat') renderGeneralChat(); else if(activeTab==='profile') renderProfile(currentUser, true); else if(activeTab==='settings') renderSettings(); }

    // Dialogs
    async function renderDialogsList() { let dialogsSnap=await dialogsRef.once('value'); let allDialogs=dialogsSnap.val()||{}; let dialogUsers=new Set(); for(let key in allDialogs) { let [u1,u2]=key.split('_'); if(u1===currentUser) dialogUsers.add(u2); if(u2===currentUser) dialogUsers.add(u1); } let usersSnap=await usersRef.once('value'); for(let u in usersSnap.val()) if(u!==currentUser) dialogUsers.add(u); let html=`<div class="search-bar"><input id="search-user" class="search-input" placeholder="Поиск..."><button class="circle-btn" id="search-btn">🔍</button></div>`; for(let other of dialogUsers) html+=`<div class="dialog-item" data-other="${escapeHtml(other)}">${await renderAvatarHtml(other,48)}<div style="flex:1;color:white;"><b>${escapeHtml(other)}</b></div></div>`; dynamicContent.innerHTML=html; document.getElementById('search-btn').onclick=()=>{ let q=document.getElementById('search-user').value.trim(); if(q) searchUser(q); }; document.querySelectorAll('.dialog-item').forEach(el=>el.onclick=()=>{ currentDialog=el.dataset.other; renderPrivateChat(currentDialog); }); }
    async function searchUser(q) { let snap=await usersRef.once('value'); let found=Object.keys(snap.val()||{}).find(u=>u.toLowerCase().startsWith(q.toLowerCase())); if(found) { viewingProfile=found; renderProfile(found,false); } else alert('Пользователь не найден'); }

    // Private chat with read receipts
    async function renderPrivateChat(other) {
        let key=[currentUser,other].sort().join('_');
        let messagesRef=dialogsRef.child(key);
        let msgsSnap=await messagesRef.orderByChild('timestamp').limitToLast(50).once('value');
        let messages=msgsSnap.val()||{};
        let sorted=Object.values(messages).sort((a,b)=>a.timestamp-b.timestamp);

    // Games (tic-tac-toe via Firebase)
    async function createGame(opponent=null) {
        let gameId=Date.now()+'-'+Math.random();
        let gameData={ board:Array(9).fill(''), players:[currentUser, opponent], turn:currentUser, status:'waiting', winner:null };
        await gamesRef.child(gameId).set(gameData);
        let msg={ sender:currentUser, gameInvite:true, gameId, timestamp:Date.now() };
        if(opponent) await dialogsRef.child([currentUser,opponent].sort().join('_')).push(msg);
        else await generalMessagesRef.push(msg);
        openGameModal(gameId);
    }
    async function joinGame(gameId) { openGameModal(gameId); }
    function openGameModal(gameId) { gameModal.classList.remove('hidden'); document.getElementById('close-game').onclick=()=>gameModal.classList.add('hidden'); document.getElementById('reset-game').onclick=()=>resetGame(gameId); listenGame(gameId); }
    async function listenGame(gameId) { gamesRef.child(gameId).on('value', snap=>{ let game=snap.val(); if(!game) return; renderGameBoard(game,gameId); }); }
    function renderGameBoard(game,gameId) { let boardDiv=document.getElementById('game-board'); let statusDiv=document.getElementById('game-status'); if(!boardDiv) return; let html=''; for(let i=0;i<9;i++) html+=`<div class="cell" data-index="${i}">${game.board[i]||''}</div>`; boardDiv.innerHTML=html; if(game.status==='waiting') statusDiv.innerText='Ожидание второго игрока...'; else if(game.status==='playing') statusDiv.innerText=`Ход: ${game.turn===currentUser?'Ваш':'Противник'}`; else if(game.winner) statusDiv.innerText=`Победил: ${game.winner}`; else statusDiv.innerText='Ничья'; document.querySelectorAll('.cell').forEach(cell=>cell.onclick=async()=>{ let idx=cell.dataset.index; if(game.status!=='playing' || game.turn!==currentUser || game.board[idx]!=='') return; let newBoard=[...game.board]; newBoard[idx]=game.turn==='X'?'X':'O'; let newTurn=game.turn==='X'?'O':'X'; let winner=checkWin(newBoard); let newStatus=winner?'finished':(newBoard.every(c=>c)?'finished':'playing'); await gamesRef.child(gameId).update({ board:newBoard, turn:newTurn, status:newStatus, winner:winner||null }); }); }
    function checkWin(board) { let lines=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]]; for(let l of lines) if(board[l[0]] && board[l[0]]===board[l[1]] && board[l[1]]===board[l[2]]) return board[l[0]]; return null; }
    async function resetGame(gameId) { await gamesRef.child(gameId).update({ board:Array(9).fill(''), turn:currentUser, status:'playing', winner:null }); }

    // WebRTC calls
    async function startCall(targetUser) {
        if(!navigator.mediaDevices) { alert('Ваш браузер не поддерживает звонки'); return; }
        let callId=Date.now()+'-'+Math.random();
        let offer=await createOffer();
        let callData={ offer, from:currentUser, to:targetUser, status:'calling' };
        await callsRef.child(callId).set(callData);
        let msg={ sender:currentUser, callInvite:true, callId, timestamp:Date.now() };
        if(targetUser) await dialogsRef.child([currentUser,targetUser].sort().join('_')).push(msg);
        else await generalMessagesRef.push(msg);
        openCallModal(callId,true);
    }
    async function createOffer() { localStream=await navigator.mediaDevices.getUserMedia({video:true,audio:true}); document.getElementById('local-video').srcObject=localStream; let pc=new RTCPeerConnection(); localStream.getTracks().forEach(t=>pc.addTrack(t,localStream)); let offer=await pc.createOffer(); await pc.setLocalDescription(offer); return offer; }
    function openCallModal(callId,isCaller) { callModal.classList.remove('hidden'); document.getElementById('close-call-modal').onclick=()=>{ if(peerConnection) peerConnection.close(); if(localStream) localStream.getTracks().forEach(t=>t.stop()); callModal.classList.add('hidden'); }; document.getElementById('end-call-btn').onclick=()=>{ if(peerConnection) peerConnection.close(); if(localStream) localStream.getTracks().forEach(t=>t.stop()); callModal.classList.add('hidden'); }; document.getElementById('toggle-video').onclick=()=>{ if(localStream) localStream.getVideoTracks()[0].enabled=!localStream.getVideoTracks()[0].enabled; }; document.getElementById('toggle-audio').onclick=()=>{ if(localStream) localStream.getAudioTracks()[0].enabled=!localStream.getAudioTracks()[0].enabled; }; if(isCaller) listenCall(callId); else answerCall(callId); }
    async function answerCall(callId) { let snap=await callsRef.child(callId).once('value'); let call=snap.val(); if(!call) return; localStream=await navigator.mediaDevices.getUserMedia({video:true,audio:true}); document.getElementById('local-video').srcObject=localStream; let pc=new RTCPeerConnection(); localStream.getTracks().forEach(t=>pc.addTrack(t,localStream)); pc.setRemoteDescription(new RTCSessionDescription(call.offer)); let answer=await pc.createAnswer(); await pc.setLocalDescription(answer); await callsRef.child(callId).update({ answer }); pc.ontrack=e=>{ document.getElementById('remote-video').srcObject=e.streams[0]; }; listenCall(callId); }
    function listenCall(callId) { callsRef.child(callId).on('value', async snap=>{ let call=snap.val(); if(!call) return; if(call.answer && peerConnection && peerConnection.remoteDescription===null) await peerConnection.setRemoteDescription(new RTCSessionDescription(call.answer)); }); }

    // Helper to render avatar html (simplified)
    async function renderAvatarHtml(username,size) { let snap=await usersRef.child(username).once('value'); let user=snap.val(); let frameClass=getAvatarFrameClass(user||{}); if(user?.avatar) return `<img src="${user.avatar}" style="width:${size}px;height:${size}px;border-radius:50%;object-fit:cover;" class="${frameClass}">`; else return `<div style="width:${size}px;height:${size}px;border-radius:50%;background:linear-gradient(145deg,#475569,#1e293b);display:flex;align-items:center;justify-content:center;color:white;font-size:${size*0.4}px;" class="${frameClass}">${username.charAt(0).toUpperCase()}</div>`; }

    // Admin Alochnost gets all frames
    (async function() { let adminSnap=await usersRef.child('Alochnost').once('value'); if(adminSnap.exists()) { let admin=adminSnap.val(); if(!admin.frames || admin.frames.length<4) await usersRef.child('Alochnost').update({ frames:['bronze','silver','gold','platinum'], onlineTime:100*3600, activeFrame:'platinum' }); } })();
</script>
