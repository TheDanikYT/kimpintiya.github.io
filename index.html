<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Кимпиньтяо</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a1f1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6px;
            transition: all 0.3s;
        }

        body.theme-dark { background: #0f172a; }
        body.theme-dark .app-container { background: rgba(30, 41, 59, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        body.theme-emerald { background: #0a2f24; }
        body.theme-emerald .app-container { background: linear-gradient(145deg, #0a2f24, #052015); border: 1px solid #2e7d64; box-shadow: 0 0 15px rgba(46, 125, 100, 0.3); }
        
        body.theme-gradient { background: linear-gradient(145deg, #1e293b, #0f172a); }
        body.theme-gradient .app-container { background: linear-gradient(145deg, #1e293b, #0f172a); border: 1px solid #475569; }
        
        body.theme-cyberpunk {
            background: linear-gradient(45deg, #ff0066, #00ffcc, #ff00ff, #00ccff);
            background-size: 400% 400%;
            animation: gradientShift 5s ease infinite;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        body.theme-cyberpunk .app-container {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(30px);
            border: 2px solid rgba(0, 255, 255, 0.5);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
            animation: borderPulse 2s ease-in-out infinite;
        }
        @keyframes borderPulse {
            0%, 100% { border-color: rgba(0, 255, 255, 0.5); box-shadow: 0 0 30px rgba(0, 255, 255, 0.3); }
            50% { border-color: rgba(255, 0, 255, 0.8); box-shadow: 0 0 50px rgba(255, 0, 255, 0.5); }
        }
        body.theme-cyberpunk .message {
            background: rgba(0, 255, 255, 0.2);
            border: 1px solid #0ff;
            backdrop-filter: blur(10px);
        }
        body.theme-cyberpunk .message.out {
            background: linear-gradient(135deg, #ff0066, #ff00cc);
            border: 1px solid #ff00ff;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            height: 96vh;
            border-radius: 36px;
            box-shadow: 0 25px 50px -12px black;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .auth-screen {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #0a2f24, #052015);
            padding: 20px;
        }
        .auth-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 40px 24px;
            border-radius: 48px;
            width: 100%;
            border: 1px solid rgba(80, 180, 120, 0.3);
        }
        .auth-box h1 {
            font-size: 2.8rem;
            font-weight: 800;
            text-align: center;
            background: linear-gradient(135deg, #6ee7b7, #2e7d64);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .auth-input {
            width: 100%;
            padding: 16px 20px;
            border: none;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
            margin-bottom: 12px;
            outline: none;
            border: 1px solid rgba(80, 180, 120, 0.3);
        }
        .auth-buttons {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        .auth-btn {
            flex: 1;
            background: linear-gradient(145deg, #2e7d64, #1e5a48);
            border: none;
            color: white;
            font-weight: 600;
            padding: 14px;
            border-radius: 30px;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 5px 0 #0a3a2c;
            transition: 0.1s;
            border: 1px solid rgba(80,180,120,0.5);
        }
        .auth-btn.secondary {
            background: linear-gradient(145deg, #475569, #334155);
            box-shadow: 0 5px 0 #1e293b;
        }
        .auth-btn:active { transform: translateY(4px); box-shadow: 0 1px 0 #0a3a2c; }
        .error-message {
            color: #f87171;
            font-size: 0.9rem;
            margin-top: 12px;
            text-align: center;
        }

        .chat-app {
            height: 100%;
            display: flex;
            flex-direction: column;
            background: transparent;
        }
        .chat-header {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid rgba(80,180,120,0.3);
        }
        .app-name {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #6ee7b7, #2e7d64);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-right: auto;
        }
        .current-user {
            background: rgba(80,180,120,0.2);
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: 600;
            color: #d9f0e6;
            font-size: 0.9rem;
            border: 1px solid rgba(80,180,120,0.4);
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }
        .verified-badge {
            background: #2e7d64;
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-left: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        .icon-btn {
            background: rgba(80,180,120,0.2);
            border: none;
            color: #e2e8f0;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(80,180,120,0.3);
            flex-shrink: 0;
            position: relative;
        }
        .badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ef4444;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #1e293b;
        }

        .tabs {
            display: flex;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(80,180,120,0.3);
            padding: 6px 6px;
            gap: 4px;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 10px 0;
            font-size: 1.3rem;
            color: #94a3b8;
            border-radius: 40px;
            cursor: pointer;
        }
        .tab.active {
            background: rgba(80,180,120,0.3);
            color: #6ee7b7;
        }

        .tab-content {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scrollbar-width: thin;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 8px 4px;
        }
        .message {
            max-width: 85%;
            padding: 10px 16px;
            border-radius: 24px;
            background: rgba(80,180,120,0.2);
            border: 1px solid rgba(80,180,120,0.3);
            color: #f1f5f9;
            align-self: flex-start;
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }
        .message.out {
            align-self: flex-end;
            background: linear-gradient(145deg, #2e7d64, #1e5a48);
        }
        .message-avatar {
            cursor: pointer;
            flex-shrink: 0;
        }
        .message-content {
            flex: 1;
        }
        .message .sender {
            font-size: 0.75rem;
            color: #bae6fd;
            font-weight: 600;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .message-image {
            max-width: 180px;
            border-radius: 16px;
            margin-top: 5px;
        }
        .message-audio {
            max-width: 200px;
            height: 40px;
            margin-top: 5px;
            border-radius: 20px;
        }
        .invite-message {
            background: linear-gradient(145deg, #2e7d64, #1e5a48);
            padding: 12px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }
        .join-btn {
            background: white;
            color: #1e5a48;
            border: none;
            padding: 6px 16px;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
        }

        .input-area {
            display: flex;
            gap: 6px;
            align-items: center;
            padding: 8px 10px;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(80,180,120,0.3);
            flex-wrap: wrap;
        }
        .input-area input {
            flex: 1 1 150px;
            min-width: 120px;
            background: rgba(80,180,120,0.2);
            border: none;
            border-radius: 40px;
            padding: 12px 16px;
            color: white;
            font-size: 1rem;
            outline: none;
            border: 1px solid rgba(80,180,120,0.4);
        }
        .action-btn-group {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .circle-btn {
            background: rgba(80,180,120,0.2);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            border: 1px solid rgba(80,180,120,0.4);
            color: #e2e8f0;
            flex-shrink: 0;
            cursor: pointer;
        }
        #pm-send, #chat-send {
            background: linear-gradient(145deg, #2e7d64, #1e5a48);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            color: white;
            font-size: 1.4rem;
            box-shadow: 0 5px 0 #0a3a2c;
            flex-shrink: 0;
            cursor: pointer;
        }

        .profile-card, .post-card, .settings-card, .chat-card {
            background: rgba(80,180,120,0.1);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 20px;
            border: 1px solid rgba(80,180,120,0.3);
        }
        
        .avatar-wrapper {
            position: relative;
            display: inline-block;
            border-radius: 50%;
            overflow: hidden;
            background: #334155;
        }
        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }
        .avatar-large {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
        }
        .avatar-placeholder {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: linear-gradient(145deg, #2e7d64, #1e5a48);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            color: white;
        }
        
        .frame-10min { border: 4px solid #fbbf24; box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.5); border-radius: 50%; }
        .frame-100h { border: 4px solid #a78bfa; box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.5); border-radius: 50%; }
        .frame-500h { border: 4px solid #ec489a; box-shadow: 0 0 0 3px rgba(236, 72, 153, 0.5); border-radius: 50%; animation: framePulse 2s ease-in-out infinite; }
        .frame-1000h { border: 4px solid #14b8a6; box-shadow: 0 0 0 3px #0d9488, 0 0 0 6px #2dd4bf; border-radius: 50%; animation: frameGlow 1.5s ease-in-out infinite; }
        @keyframes framePulse {
            0%, 100% { box-shadow: 0 0 0 3px rgba(236, 72, 153, 0.5); }
            50% { box-shadow: 0 0 0 8px rgba(236, 72, 153, 0.8); }
        }
        @keyframes frameGlow {
            0%, 100% { box-shadow: 0 0 0 3px #0d9488, 0 0 0 6px #2dd4bf; }
            50% { box-shadow: 0 0 0 5px #0d9488, 0 0 0 10px #2dd4bf; }
        }
        
        .profile-banner {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 24px;
            margin-bottom: 12px;
            cursor: pointer;
            background: #334155;
        }
        .profile-name {
            font-size: 1.8rem;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 12px;
        }
        .profile-bio { color: #cbd5e1; text-align: center; margin: 8px 0; }
        .stat-value { font-size: 1.4rem; color: #6ee7b7; }
        .action-btn {
            background: rgba(80,180,120,0.2);
            border: 1px solid rgba(80,180,120,0.4);
            color: white;
            padding: 10px 18px;
            border-radius: 40px;
            cursor: pointer;
            margin: 4px;
            font-size: 0.9rem;
            transition: 0.1s;
        }
        .action-btn:active { transform: scale(0.97); }
        .admin-btn {
            background: #fbbf24;
            color: #0f172a;
            border: none;
        }

        .dialog-item, .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: rgba(80,180,120,0.1);
            border-radius: 30px;
            margin-bottom: 6px;
            cursor: pointer;
        }

        .search-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        .search-input {
            flex: 1;
            padding: 12px 18px;
            border-radius: 40px;
            background: rgba(80,180,120,0.1);
            border: 1px solid rgba(80,180,120,0.3);
            color: white;
        }

        .hashtag {
            color: #6ee7b7;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
        }
        .hashtag:hover {
            text-decoration: underline;
        }

        .notifications-modal, .frame-modal, .friends-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(15px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 4000;
            padding: 20px;
        }
        .notifications-card, .frame-card, .friends-card {
            background: rgba(80,180,120,0.2);
            border-radius: 48px;
            padding: 25px;
            width: 100%;
            max-width: 340px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .frame-option {
            background: rgba(80,180,120,0.2);
            border-radius: 20px;
            padding: 15px;
            margin: 10px 0;
            cursor: pointer;
            text-align: center;
        }
        .frame-option.locked {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .friend-request {
            background: rgba(80,180,120,0.1);
            border-radius: 20px;
            padding: 12px;
            margin: 8px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .privacy-option {
            background: rgba(80,180,120,0.1);
            border-radius: 16px;
            padding: 12px;
            margin: 8px 0;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .privacy-option.active {
            background: rgba(46, 125, 100, 0.5);
            border: 1px solid #2e7d64;
        }
        .hidden { display: none !important; }

        /* Стили для постов и комментариев (светлый текст) */
        .post-content, .post-card, .comment-text, .comment-author, .comment-time {
            color: #f1f5f9;
        }
        .comment-author {
            font-weight: bold;
            cursor: pointer;
            color: #6ee7b7;
        }
        .comment-text {
            margin-left: 8px;
        }
        .comment-time {
            font-size: 0.7rem;
            color: #94a3b8;
            margin-left: 8px;
        }

        /* Аудиоплеер-диск */
        .music-disk {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #2e7d64, #1e5a48);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
            margin: 0 auto 10px;
        }
        .music-disk:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(46,125,100,0.8);
        }
        .music-disk i {
            font-size: 2rem;
            color: #6ee7b7;
        }

        /* Горизонтальный скролл для каналов */
        .horizontal-scroll {
            display: flex;
            overflow-x: auto;
            gap: 12px;
            padding: 8px 0;
            scrollbar-width: thin;
            -webkit-overflow-scrolling: touch;
        }
        .channel-card {
            background: rgba(80,180,120,0.2);
            border-radius: 24px;
            padding: 10px 16px;
            flex-shrink: 0;
            cursor: pointer;
            text-align: center;
            color: white;
            font-weight: bold;
            border: 1px solid rgba(80,180,120,0.4);
            transition: 0.1s;
            white-space: nowrap;
        }
        .channel-card:active { transform: scale(0.97); }

        .code-block {
            background: rgba(0,0,0,0.5);
            padding: 8px 12px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin: 8px 0;
        }
        .copy-code {
            background: #2e7d64;
            border: none;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            cursor: pointer;
        }

        .attached-chat-btn {
            background: rgba(46,125,100,0.3);
            border: 1px solid #2e7d64;
            border-radius: 30px;
            padding: 8px 16px;
            margin: 8px auto;
            text-align: center;
            cursor: pointer;
            display: inline-block;
            color: white;
            font-weight: bold;
            transition: 0.1s;
        }
        .attached-chat-btn:hover {
            background: rgba(46,125,100,0.6);
        }

        @media (max-width: 400px) {
            .app-name { font-size: 1.5rem; }
            .circle-btn { width: 38px; height: 38px; font-size: 1.3rem; }
        }
    </style>
</head>
<body class="theme-emerald">
<div class="app-container">
    <div id="auth-screen" class="auth-screen">
        <div class="auth-box">
            <h1>Кимпиньтяо</h1>
            <input type="text" id="login-username" class="auth-input" placeholder="Имя">
            <input type="password" id="login-password" class="auth-input" placeholder="Пароль">
            <div class="auth-buttons">
                <button id="login-btn" class="auth-btn">Войти</button>
                <button id="register-btn" class="auth-btn secondary">Регистрация</button>
            </div>
            <div id="auth-error" class="error-message"></div>
            <div id="firebase-status" style="color:#6ee7b7; font-size:0.8rem; text-align:center; margin-top:8px;"></div>
        </div>
    </div>

    <div id="chat-app" class="chat-app hidden">
        <div class="chat-header">
            <span class="app-name">Кимпиньтяо</span>
            <span class="current-user" id="current-user-display"></span>
            <button class="icon-btn" id="notifications-btn" title="Уведомления"><i class="fas fa-bell"></i><span id="notifications-badge" class="badge hidden">0</span></button>
            <button class="icon-btn" id="logout-btn" title="Выйти"><i class="fas fa-sign-out-alt"></i></button>
        </div>

        <div id="dynamic-content" class="tab-content"></div>

        <div class="tabs">
            <div class="tab active" data-tab="dialogs"><i class="fas fa-comment-dots"></i></div>
            <div class="tab" data-tab="feed"><i class="fas fa-newspaper"></i></div>
            <div class="tab" data-tab="chats"><i class="fas fa-users"></i></div>
            <div class="tab" data-tab="profile"><i class="fas fa-user"></i></div>
            <div class="tab" data-tab="settings"><i class="fas fa-cog"></i></div>
        </div>
    </div>

    <div id="notifications-modal" class="notifications-modal hidden">
        <div class="notifications-card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <span style="color:white; font-size:1.8rem;"><i class="fas fa-bell"></i> Уведомления</span>
                <button class="icon-btn" id="close-notifications" style="width:40px;height:40px;"><i class="fas fa-times"></i></button>
            </div>
            <div id="notifications-list" style="color:white;"></div>
        </div>
    </div>

    <div id="frame-modal" class="frame-modal hidden">
        <div class="frame-card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <span style="color:white; font-size:1.5rem;"><i class="fas fa-image"></i> Выбор рамки</span>
                <button class="icon-btn" id="close-frame-modal" style="width:40px;height:40px;"><i class="fas fa-times"></i></button>
            </div>
            <div id="frame-options"></div>
        </div>
    </div>

    <div id="friends-modal" class="friends-modal hidden">
        <div class="friends-card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">

    // ================== ХЕШИРОВАНИЕ ПАРОЛЕЙ ==================
    async function hashPassword(password) {
        const encoder = new TextEncoder();
        const data = encoder.encode(password);
        const hashBuffer = await crypto.subtle.digest('SHA-256', data);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // ================== КУКИ ==================
    function setCookie(name, value, days) {
        const expires = new Date();
        expires.setTime(expires.getTime() + days * 24 * 60 * 60 * 1000);
        document.cookie = `${name}=${value};expires=${expires.toUTCString()};path=/;SameSite=Strict`;
    }
    function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
        return null;
    }
    function deleteCookie(name) {
        document.cookie = `${name}=;expires=Thu, 01 Jan 1970 00:00:00 UTC;path=/`;
    }

    // ================== ВСПОМОГАТЕЛЬНЫЕ ==================
    function escapeHtml(unsafe) {
        if (!unsafe) return '';
        return unsafe.replace(/[&<>]/g, m => {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }
    function timeAgo(timestamp) {
        const diff = Date.now() - timestamp;
        if (diff < 60000) return 'только что';
        if (diff < 3600000) return Math.floor(diff/60000)+' мин назад';
        if (diff < 86400000) return Math.floor(diff/3600000)+' ч назад';
        return new Date(timestamp).toLocaleDateString();
    }

    // ================== ПРОВЕРКА ПРАВ НА ОТПРАВКУ СООБЩЕНИЯ ==================
    async function canSendMessage(toUser) {
        const toUserSnap = await usersRef.child(toUser).once('value');
        const toUserData = toUserSnap.val();
        if (!toUserData) return false;
        
        const privacy = toUserData.privacySetting || 'all';
        
        if (privacy === 'all') return true;
        
        const friends = toUserData.friends || [];
        const followers = toUserData.followers || [];
        const following = toUserData.following || [];
        
        switch(privacy) {
            case 'friends':
                return friends.includes(currentUser);
            case 'mutual':
                return friends.includes(currentUser) && following.includes(toUser);
            case 'followers':
                return followers.includes(currentUser);
            default:
                return true;
        }
    }

    // ================== ЗАПРОСЫ В ДРУЗЬЯ (сокращённо) ==================
    async function sendFriendRequest(toUser) {
        if (toUser === currentUser) { alert('Нельзя добавить себя в друзья'); return; }
        const currentFriends = currentUserData.friends || [];
        if (currentFriends.includes(toUser)) { alert('Уже в друзьях'); return; }
        const existingRequests = currentUserData.sentFriendRequests || [];
        if (existingRequests.includes(toUser)) { alert('Запрос уже отправлен'); return; }
        const toUserSnap = await usersRef.child(toUser).once('value');
        const toUserData = toUserSnap.val();
        if (!toUserData) { alert('Пользователь не найден'); return; }
        const incomingRequests = toUserData.incomingFriendRequests || [];
        if (incomingRequests.includes(currentUser)) { alert('Запрос уже существует'); return; }
        incomingRequests.push(currentUser);
        await usersRef.child(toUser).child('incomingFriendRequests').set(incomingRequests);
        const sentRequests = currentUserData.sentFriendRequests || [];
        sentRequests.push(toUser);
        await usersRef.child(currentUser).child('sentFriendRequests').set(sentRequests);
        currentUserData.sentFriendRequests = sentRequests;
        await addNotification(toUser, { type: 'friend', text: `${currentUser} хочет добавить вас в друзья!` });
        alert(`Запрос отправлен ${toUser}`);
        if (viewingProfile === toUser) renderProfile(toUser, false);
    }

    async function acceptFriendRequest(fromUser) {
        const currentSnap = await usersRef.child(currentUser).once('value');
        const currentData = currentSnap.val();
        const fromSnap = await usersRef.child(fromUser).once('value');
        const fromData = fromSnap.val();
        if (!currentData || !fromData) return;
        const incoming = currentData.incomingFriendRequests || [];
        const newIncoming = incoming.filter(u => u !== fromUser);
        await usersRef.child(currentUser).child('incomingFriendRequests').set(newIncoming);
        const sentFrom = fromData.sentFriendRequests || [];
        const newSentFrom = sentFrom.filter(u => u !== currentUser);
        await usersRef.child(fromUser).child('sentFriendRequests').set(newSentFrom);
        const currentFriends = currentData.friends || [];
        if (!currentFriends.includes(fromUser)) {
            currentFriends.push(fromUser);
            await usersRef.child(currentUser).child('friends').set(currentFriends);
        }
        const fromFriends = fromData.friends || [];
        if (!fromFriends.includes(currentUser)) {
            fromFriends.push(currentUser);
            await usersRef.child(fromUser).child('friends').set(fromFriends);
        }
        currentUserData.friends = currentFriends;
        currentUserData.incomingFriendRequests = newIncoming;
        await addNotification(fromUser, { type: 'friend', text: `${currentUser} принял запрос!` });
        alert(`Теперь друзья с ${fromUser}`);
        if (viewingProfile === fromUser) renderProfile(fromUser, false);
        renderSettings();
    }

    async function declineFriendRequest(fromUser) {
        const currentSnap = await usersRef.child(currentUser).once('value');

        const fromSnap = await usersRef.child(fromUser).once('value');

        }
        currentUserData.incomingFriendRequests = newIncoming;
        alert(`Запрос от ${fromUser} отклонён`);
        renderSettings();
    }

    async function cancelFriendRequest(toUser) {
        const sentRequests = currentUserData.sentFriendRequests || [];
        if (!sentRequests.includes(toUser)) return;
        const newSent = sentRequests.filter(u => u !== toUser);
        await usersRef.child(currentUser).child('sentFriendRequests').set(newSent);
        currentUserData.sentFriendRequests = newSent;
        const toSnap = await usersRef.child(toUser).once('value');
        const toData = toSnap.val();
        if (toData) {
            const incoming = toData.incomingFriendRequests || [];
            const newIncoming = incoming.filter(u => u !== currentUser);
            await usersRef.child(toUser).child('incomingFriendRequests').set(newIncoming);
        }
        alert(`Запрос к ${toUser} отменён`);
        if (viewingProfile === toUser) renderProfile(toUser, false);
    }

    async function startOnlineTracking() {
        if (!currentUser) return;
        onlineStartTime = Date.now();
        window.addEventListener('beforeunload', () => saveOnlineTime());
        onlineRef.child(currentUser).onDisconnect().set(null);
        setInterval(() => saveOnlineTime(), 60000);

    async function saveOnlineTime() {
        if (!currentUser || !onlineStartTime) return;
        const elapsed = Date.now() - onlineStartTime;
        if (elapsed < 1000) return;
        const userSnap = await usersRef.child(currentUser).once('value');
        const user = userSnap.val();
        let totalTime = (user.totalOnlineTime || 0) + elapsed;
        await usersRef.child(currentUser).child('totalOnlineTime').set(totalTime);
        onlineStartTime = Date.now();
        await checkAndUnlockFrames(totalTime);
    }

    async function checkAndUnlockFrames(totalTime) {
        const hours = totalTime / (1000 * 3600);
        const frameRequirements = { '10min': 10/60, '100h': 100, '500h': 500, '1000h': 1000 };
        const unlockedFrames = currentUserData.unlockedFrames || [];
        let newFrames = [];
        for (const [frame, req] of Object.entries(frameRequirements)) {
            if (hours >= req && !unlockedFrames.includes(frame)) newFrames.push(frame);
        }
        if (newFrames.length) {
            const updatedFrames = [...unlockedFrames, ...newFrames];
            await usersRef.child(currentUser).child('unlockedFrames').set(updatedFrames);
            currentUserData.unlockedFrames = updatedFrames;
            for (const frame of newFrames) {
                await addNotification(currentUser, { type: 'frame', text: `Вы открыли рамку "${getFrameName(frame)}"!` });
            }
        }
    }

    function getFrameName(frameId) {
        const names = { '10min': '🌟 10 минут', '100h': '💜 100 часов', '500h': '💖 500 часов', '1000h': '👑 1000 часов' };
        return names[frameId] || frameId;
    }

    async function login(username, password) {
        if (!checkFirebaseOrShowError()) return;
        if (!username || !password) { showAuthError('Заполните поля'); return; }
        try {
            const snapshot = await usersRef.child(username).once('value');
            const user = snapshot.val();
            if (!user) { showAuthError('Пользователь не найден'); return; }
            const hashedInput = await hashPassword(password);
            if (user.password !== hashedInput) { showAuthError('Неверный пароль'); return; }
            currentUser = username;
            currentUserData = user;
            setCookie('kim_session', username, 30);
            localStorage.setItem('kim_current_user', username);
            authScreen.classList.add('hidden');
            chatApp.classList.remove('hidden');
            currentUserSpan.innerHTML = `<span>${escapeHtml(username)}${user.verified ? '<span class="verified-badge">✓</span>' : ''}</span>`;
            currentUserSpan.style.cursor = 'pointer';
            currentUserSpan.onclick = () => openUserProfile(username);
            onlineRef.child(username).set(true);
            onlineRef.child(username).onDisconnect().remove();
            startOnlineTracking();
            activeTab = 'dialogs';
            renderTab();
            subscribeToNotifications();
        } catch (e) { showAuthError('Ошибка: ' + e.message); }
    }

    async function register(username, password) {
        if (!checkFirebaseOrShowError()) return;
        if (!username || !password) { showAuthError('Заполните поля'); return; }
        try {
            const snapshot = await usersRef.child(username).once('value');
            if (snapshot.exists()) { showAuthError('Имя уже занято'); return; }
            const hashedPassword = await hashPassword(password);
            const newUser = {
                password: hashedPassword,
                avatar: null, banner: null, bio: '', musicUrl: null,
                friends: [], followers: [], following: [],
                verified: false, isAdmin: false, totalOnlineTime: 0,
                unlockedFrames: [], currentFrame: null,
                privacySetting: 'all', sentFriendRequests: [], incomingFriendRequests: [],
                attachedChat: null
            };
            await usersRef.child(username).set(newUser);
            showAuthError('✅ Регистрация успешна! Теперь войдите.');
        } catch (e) { showAuthError('Ошибка: ' + e.message); }
    }

    async function markNotificationsAsRead() {
        if (!currentUser) return;
        const snapshot = await notificationsRef.child(currentUser).once('value');
        const notifs = snapshot.val() || {};
        const updates = {};
        Object.keys(notifs).forEach(key => { if (!notifs[key].read) updates[`${key}/read`] = true; });
        if (Object.keys(updates).length) await notificationsRef.child(currentUser).update(updates);
    }

    function subscribeToNotifications() {
        if (!currentUser) return;
        notificationsRef.child(currentUser).on('value', (snap) => {
            const notifs = snap.val() || {};
            const unread = Object.values(notifs).filter(n => !n.read).length;
            if (unread > 0) { notificationsBadge.textContent = unread; notificationsBadge.classList.remove('hidden'); }
            else notificationsBadge.classList.add('hidden');
        });
    }

        recordBtn.addEventListener('mouseup', stopPMRecording);

            input.value = '';

        pmMessagesListener = messagesRef.on('child_added', async (snapshot) => {
            if (currentDialog === other && document.getElementById('pm-messages')) {
                const msg = snapshot.val();
                const senderSnap = await usersRef.child(msg.sender).once('value');

    function renderMessageHtml(msg, isOut, senderData, senderName) {
        const frameClass = getUserFrameClass(senderData);
        let content = msg.text ? escapeHtml(msg.text) : '';
        // Делаем хештеги кликабельными
        content = content.replace(/#(\w+)/g, '<span class="hashtag" data-hashtag="$1">#$1</span>');
        return `
            <div class="message ${isOut ? 'out' : 'in'}">
                <div class="message-avatar" onclick="openUserProfile('${senderName}')">
                    <div class="avatar-wrapper ${frameClass}" style="width:40px; height:40px;">
                        ${senderData?.avatar ? `<img src="${senderData.avatar}" style="width:100%; height:100%; object-fit:cover; border-radius:50%;">` : `<div style="width:100%; height:100%; background:linear-gradient(145deg,#2e7d64,#1e5a48); display:flex; align-items:center; justify-content:center; color:white; font-size:16px;">${senderName.charAt(0).toUpperCase()}</div>`}
                    </div>
                </div>
                <div class="message-content">
                    <div class="sender">${escapeHtml(senderName)}${senderData?.verified ? '<span class="verified-badge">✓</span>' : ''}</div>
                    <div>${content}</div>
                    ${msg.imageUrl ? `<img src="${msg.imageUrl}" class="message-image">` : ''}
                    ${msg.audioUrl ? `<audio controls src="${msg.audioUrl}" class="message-audio"></audio>` : ''}
                    <div style="font-size:0.7rem;">${timeAgo(msg.timestamp)}</div>
                </div>
            </div>
        `;
    }

    function handlePMFile(e, other) {
        const file = e.target.files[0];
        if (!file) return;
        if (file.size > 5*1024*1024) { alert('Макс 5 МБ'); e.target.value = ''; return; }
        const reader = new FileReader();
        reader.onload = (ev) => {
            const key = [currentUser, other].sort().join('_');
            const type = e.target.id.includes('image') ? 'image' : 'audio';
            const msg = { sender: currentUser, timestamp: Date.now() };
            if (type === 'image') msg.imageUrl = ev.target.result;
            else msg.audioUrl = ev.target.result;
            dialogsRef.child(key).push(msg);
        };
        reader.readAsDataURL(file);
    }

    let pmRecordingStream = null;
    async function startPMRecording(other) {
        if (recording) return;
        try {
            pmRecordingStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(pmRecordingStream);
            recordedChunks = [];
            mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'audio/webm' });
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const key = [currentUser, other].sort().join('_');
                    const msg = { sender: currentUser, audioUrl: ev.target.result, timestamp: Date.now() };
                    dialogsRef.child(key).push(msg);
                    pmRecordingStream.getTracks().forEach(t => t.stop());
                };
                reader.readAsDataURL(blob);
            };
            mediaRecorder.start();
            recording = true;
            document.getElementById('pm-record').style.background = '#c74b4b';
        } catch (err) { alert('Микрофон недоступен'); }
    }
    function stopPMRecording() {
        if (mediaRecorder && recording) {
            mediaRecorder.stop();
            recording = false;
            if (document.getElementById('pm-record')) document.getElementById('pm-record').style.background = '';
        }
    }

    function handleChatFile(e, chatId) {
        const file = e.target.files[0];
        if (!file) return;
        if (file.size > 5*1024*1024) { alert('Макс 5 МБ'); e.target.value = ''; return; }
        const reader = new FileReader();
        reader.onload = (ev) => {
            const type = e.target.id.includes('image') ? 'image' : 'audio';
            const msg = { sender: currentUser, timestamp: Date.now() };
            if (type === 'image') msg.imageUrl = ev.target.result;
            else msg.audioUrl = ev.target.result;
            chatsRef.child(chatId).child('messages').push(msg);
        };
        reader.readAsDataURL(file);
    }

    let chatRecordingStream = null;
    async function startChatRecording(chatId) {
        if (recording) return;
        try {
            chatRecordingStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(chatRecordingStream);
            recordedChunks = [];
            mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'audio/webm' });
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const msg = { sender: currentUser, audioUrl: ev.target.result, timestamp: Date.now() };
                    chatsRef.child(chatId).child('messages').push(msg);
                    chatRecordingStream.getTracks().forEach(t => t.stop());
                };
                reader.readAsDataURL(blob);
            };
            mediaRecorder.start();
            recording = true;
            document.getElementById('chat-record').style.background = '#c74b4b';
        } catch (err) { alert('Микрофон недоступен'); }
    }
    function stopChatRecording() {
        if (mediaRecorder && recording) {
            mediaRecorder.stop();
            recording = false;
            if (document.getElementById('chat-record')) document.getElementById('chat-record').style.background = '';
        }
    }

    }

    async function compressImage(dataUrl) {
        return new Promise((resolve) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                let width = img.width;
                let height = img.height;
                const maxWidth = 800;
                if (width > maxWidth) {
                    height = (height * maxWidth) / width;
                    width = maxWidth;
                }
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                resolve(canvas.toDataURL('image/jpeg', 0.7));
            };
            img.src = dataUrl;
        });
    }

        let html = `
            <div class="profile-card">
                ${user.banner ? `<img src="${user.banner}" class="profile-banner" id="banner-img" style="cursor:pointer;">` : `<div class="profile-banner" id="banner-placeholder" style="background:#2e7d64; display:flex; align-items:center; justify-content:center; color:white; cursor:pointer;"><i class="fas fa-camera"></i> Баннер</div>`}
                <div style="display:flex; justify-content:center; margin-top:-45px;">
                    <div class="avatar-wrapper ${frameClass}" style="width:90px; height:90px; cursor:pointer;" id="avatar-wrapper">
                        ${user.avatar ? `<img src="${user.avatar}" style="width:100%; height:100%; object-fit:cover; border-radius:50%;">` : `<div style="width:100%; height:100%; background:linear-gradient(145deg,#2e7d64,#1e5a48); display:flex; align-items:center; justify-content:center; color:white; font-size:2.5rem;">${username.charAt(0).toUpperCase()}</div>`}
                    </div>
                </div>
                <div class="profile-name">${escapeHtml(username)}${user.verified ? '<span class="verified-badge">✓</span>' : ''}</div>
                <div class="profile-bio">${escapeHtml(user.bio || 'Нет описания')}</div>
                ${attachedChatHtml}
                ${user.musicUrl ? `<div class="music-disk" id="play-music"><i class="fas fa-music"></i></div><audio id="profile-audio" src="${user.musicUrl}" style="display:none;"></audio>` : ''}
                <div class="profile-stats" style="display:flex; justify-content:space-around; margin:12px 0;">
                    <div><span class="stat-value">${postsCount}</span><br>постов</div>
                    <div><span class="stat-value">${user.friends ? user.friends.length : 0}</span><br>друзей</div>
                    <div><span class="stat-value">${user.followers ? user.followers.length : 0}</span><br>подписчиков</div>
                    <div><span class="stat-value">${Math.floor((user.totalOnlineTime || 0) / (1000*3600))}</span><br>часов</div>
                </div>
        `;
        if (!isOwn) {
            const isFollowing = user.followers && user.followers.includes(currentUser);
            const isFriend = user.friends && user.friends.includes(currentUser);
            html += `<div style="display:flex; flex-wrap:wrap; justify-content:center; gap:8px;">`;
            if (!isFriend) html += `<button class="action-btn" id="add-friend"><i class="fas fa-user-plus"></i> В друзья</button>`;
            else html += `<button class="action-btn" id="remove-friend"><i class="fas fa-user-minus"></i> Удалить из друзей</button>`;
            if (!isFollowing) html += `<button class="action-btn" id="follow"><i class="fas fa-bell"></i> Подписаться</button>`;
            else html += `<button class="action-btn" id="unfollow"><i class="fas fa-bell-slash"></i> Отписаться</button>`;
            html += `<button class="action-btn" id="send-message"><i class="fas fa-envelope"></i> Написать</button>`;
            if (currentUserData && currentUserData.isAdmin && !user.verified) {
                html += `<button class="action-btn admin-btn" id="grant-verify"><i class="fas fa-check-circle"></i> Выдать галочку</button>`;
            }
            html += `</div>`;
        } else {
            html += `<div style="display:flex; flex-wrap:wrap; justify-content:center; gap:8px;">
                        <button class="action-btn" id="edit-profile"><i class="fas fa-edit"></i> Редактировать</button>
                     </div>`;
        }
        html += `</div><div id="user-posts-container" style="margin-top:20px;"></div>`;
        dynamicContent.innerHTML = html;

        if (user.musicUrl) {
            const audio = document.getElementById('profile-audio');
            const disk = document.getElementById('play-music');
            if (disk) disk.addEventListener('click', () => { if (audio.paused) audio.play(); else audio.pause(); });
        }

        const postsContainer = document.getElementById('user-posts-container');
        if (postsContainer) await renderUserPosts(username, postsContainer);

        // Обработчик клика по привязанному чату
        const attachedBtn = document.querySelector('.attached-chat-btn');
        if (attachedBtn) {
            attachedBtn.addEventListener('click', async () => {
                const chatId = attachedBtn.dataset.chatId;
                const chatSnap = await chatsRef.child(chatId).once('value');
                const chat = chatSnap.val();
                if (!chat) return;
                if (chat.members && chat.members.includes(currentUser)) {
                    currentChatId = chatId;
                    renderChatRoom(chatId);
                } else {
                    // Предложить вступить
                    if (confirm(`Вступить в чат "${chat.name}"?`)) {
                        await chatsRef.child(chatId).child('members').transaction(arr => {
                            if (!arr) arr = [];
                            if (!arr.includes(currentUser)) arr.push(currentUser);
                            return arr;
                        });
                        currentChatId = chatId;
                        renderChatRoom(chatId);
                    }
                }
            });
        }

        if (isOwn) {
            document.getElementById('edit-profile').addEventListener('click', () => openProfileEditor());
            if (document.getElementById('avatar-wrapper')) document.getElementById('avatar-wrapper').addEventListener('click', () => uploadMedia('avatar'));
            if (document.getElementById('banner-img') || document.getElementById('banner-placeholder')) {
                const bannerEl = document.getElementById('banner-img') || document.getElementById('banner-placeholder');
                bannerEl.addEventListener('click', () => uploadMedia('banner'));
            }
        } else {
            if (document.getElementById('add-friend')) document.getElementById('add-friend').addEventListener('click', async () => await sendFriendRequest(username));
            if (document.getElementById('remove-friend')) document.getElementById('remove-friend').addEventListener('click', async () => await removeFriend(username));
            if (document.getElementById('follow')) document.getElementById('follow').addEventListener('click', async () => {
                await usersRef.child(username).child('followers').transaction(arr => { if (!arr) arr = []; if (!arr.includes(currentUser)) arr.push(currentUser); return arr; });
                await usersRef.child(currentUser).child('following').transaction(arr => { if (!arr) arr = []; if (!arr.includes(username)) arr.push(username); return arr; });
                renderProfile(username, false);
            });
            if (document.getElementById('unfollow')) document.getElementById('unfollow').addEventListener('click', async () => {
                await usersRef.child(username).child('followers').transaction(arr => arr ? arr.filter(u => u !== currentUser) : arr);
                await usersRef.child(currentUser).child('following').transaction(arr => arr ? arr.filter(u => u !== username) : arr);
                renderProfile(username, false);
            });
            if (document.getElementById('send-message')) document.getElementById('send-message').addEventListener('click', async () => {
                if (!await canSendMessage(username)) { alert(`Пользователь ${username} ограничил возможность писать вам.`); return; }
                currentDialog = username; renderPrivateChat(username);
            });
            if (document.getElementById('grant-verify')) {
                document.getElementById('grant-verify').addEventListener('click', async () => {
                    await usersRef.child(username).child('verified').set(true);
                    await addNotification(username, { type: 'verify', text: `Администратор выдал вам галочку!` });
                    renderProfile(username, false);
                });
            }
        }
    }

    function openProfileEditor() {
        const bio = currentUserData.bio || '';
        const attachedChat = currentUserData.attachedChat || '';
        let html = `
            <div style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); backdrop-filter:blur(15px); z-index:3000; display:flex; align-items:center; justify-content:center;">
                <div style="background:rgba(80,180,120,0.2); border-radius:48px; padding:25px; width:90%; max-width:400px;">
                    <h3 style="color:white; margin-bottom:16px;">Редактирование профиля</h3>
                    <textarea id="edit-bio" placeholder="О себе" style="width:100%; padding:12px; border-radius:24px; background:rgba(80,180,120,0.2); color:white; border:1px solid rgba(80,180,120,0.4); min-height:100px;">${escapeHtml(bio)}</textarea>
                    <div style="margin:12px 0;">
                        <label style="color:white;">Привязать публичный чат (название):</label>
                        <input type="text" id="edit-chat" placeholder="Название чата" value="${escapeHtml(attachedChat)}" style="width:100%; padding:12px; border-radius:24px; background:rgba(80,180,120,0.2); color:white; border:1px solid rgba(80,180,120,0.4);">
                    </div>
                    <div style="margin:12px 0;">
                        <button id="upload-music-editor" class="action-btn"><i class="fas fa-music"></i> Загрузить аудио</button>
                    </div>
                    <div style="margin:12px 0;">
                        <button id="select-frame-editor" class="action-btn"><i class="fas fa-border-all"></i> Выбрать рамку</button>
                    </div>
                    <div style="display:flex; gap:8px; margin-top:20px;">
                        <button id="save-profile" class="action-btn">Сохранить</button>
                        <button id="close-editor" class="action-btn">Отмена</button>
                    </div>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', html);
        const editorDiv = document.body.lastElementChild;
        document.getElementById('close-editor').addEventListener('click', () => editorDiv.remove());
        document.getElementById('save-profile').addEventListener('click', async () => {
            const newBio = document.getElementById('edit-bio').value.trim();
            const chatName = document.getElementById('edit-chat').value.trim();
            let chatId = null;
            if (chatName) {
                const snapshot = await chatsRef.once('value');
                const chats = snapshot.val() || {};
                for (let id in chats) {
                    if (chats[id].name === chatName && !chats[id].isPrivate) {
                        chatId = id;
                        break;
                    }
                }
                if (!chatId) alert('Публичный чат с таким названием не найден');
            }
            await usersRef.child(currentUser).child('bio').set(newBio);
            await usersRef.child(currentUser).child('attachedChat').set(chatId);
            currentUserData.bio = newBio;
            currentUserData.attachedChat = chatId;
            editorDiv.remove();
            renderProfile(currentUser, true);
        });
        document.getElementById('upload-music-editor').addEventListener('click', () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'audio/*';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (file && file.size <= 10*1024*1024) {
                    const reader = new FileReader();
                    reader.onload = async (ev) => {
                        await usersRef.child(currentUser).child('musicUrl').set(ev.target.result);
                        currentUserData.musicUrl = ev.target.result;
                        editorDiv.remove();
                        renderProfile(currentUser, true);
                    };
                    reader.readAsDataURL(file);
                } else alert('Аудиофайл слишком большой (макс 10 МБ)');
            };
            input.click();
        });
        document.getElementById('select-frame-editor').addEventListener('click', async () => {
            await openFrameSelector();
        });
    }

    function uploadMedia(type) {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*,image/gif';
        input.onchange = async (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    await usersRef.child(currentUser).child(type).set(ev.target.result);
                    renderProfile(currentUser, true);
                };
                reader.readAsDataURL(file);
            }
        };
        input.click();
    }

    async function openFrameSelector() {
        const unlocked = currentUserData.unlockedFrames || [];
        const current = currentUserData.currentFrame;
        const frameOptions = [
            { id: '10min', name: '🌟 10 минут онлайн', req: '10 минут' },
            { id: '100h', name: '💜 100 часов онлайн', req: '100 часов' },
            { id: '500h', name: '💖 500 часов онлайн', req: '500 часов' },
            { id: '1000h', name: '👑 1000 часов онлайн', req: '1000 часов' }
        ];
        let html = '';
        for (const opt of frameOptions) {
            const isUnlocked = unlocked.includes(opt.id);
            const isActive = current === opt.id;
            html += `
                <div class="frame-option ${!isUnlocked ? 'locked' : ''}" data-frame="${opt.id}" ${!isUnlocked ? '' : 'style="cursor:pointer;"'}>
                    <div class="avatar-wrapper ${isUnlocked ? opt.id === '10min' ? 'frame-10min' : opt.id === '100h' ? 'frame-100h' : opt.id === '500h' ? 'frame-500h' : 'frame-1000h' : ''}" style="width:60px; height:60px; margin:0 auto 10px auto;">
                        <div style="width:100%; height:100%; background:linear-gradient(145deg,#2e7d64,#1e5a48); border-radius:50%;"></div>
                    </div>
                    <div style="color:white; font-weight:bold;">${opt.name}</div>
                    <div style="color:#94a3b8; font-size:0.8rem;">Требуется: ${opt.req}</div>
                    ${isActive ? '<div style="color:#6ee7b7; margin-top:5px;">✓ Активна</div>' : ''}
                    ${!isUnlocked ? '<div style="color:#f87171; margin-top:5px;">🔒 Заблокировано</div>' : ''}
                </div>
            `;
        }
        document.getElementById('frame-options').innerHTML = html;
        frameModal.classList.remove('hidden');
        document.querySelectorAll('.frame-option:not(.locked)').forEach(el => {
            el.addEventListener('click', async () => {
                const frameId = el.dataset.frame;
                if (frameId) {
                    await usersRef.child(currentUser).child('currentFrame').set(frameId);
                    currentUserData.currentFrame = frameId;
                    frameModal.classList.add('hidden');
                    renderProfile(currentUser, true);
                }
            });
        });
    }

    // ================== НАСТРОЙКИ ==================
    function renderSettings() {
        const privacySetting = currentUserData.privacySetting || 'all';
        dynamicContent.innerHTML = `
            <div class="settings-card">
                <h3 style="color:white; margin-bottom:16px;"><i class="fas fa-palette"></i> Тема</h3>
                <div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px;">
                    <button class="theme-btn ${currentTheme==='dark'?'active':''}" data-theme="dark" style="background:${currentTheme==='dark'?'#2e7d64':'rgba(80,180,120,0.2)'}; border:none; color:white; padding:10px 18px; border-radius:40px;"><i class="fas fa-moon"></i> Тёмная</button>
                    <button class="theme-btn ${currentTheme==='emerald'?'active':''}" data-theme="emerald" style="background:${currentTheme==='emerald'?'#2e7d64':'rgba(80,180,120,0.2)'}; border:none; color:white; padding:10px 18px; border-radius:40px;"><i class="fas fa-gem"></i> Изумрудная</button>
                    <button class="theme-btn ${currentTheme==='gradient'?'active':''}" data-theme="gradient" style="background:${currentTheme==='gradient'?'#2e7d64':'rgba(80,180,120,0.2)'}; border:none; color:white; padding:10px 18px; border-radius:40px;"><i class="fas fa-fill-drip"></i> Градиент</button>
                    <button class="theme-btn ${currentTheme==='cyberpunk'?'active':''}" data-theme="cyberpunk" style="background:${currentTheme==='cyberpunk'?'#2e7d64':'rgba(80,180,120,0.2)'}; border:none; color:white; padding:10px 18px; border-radius:40px;"><i class="fas fa-robot"></i> Киберпанк</button>
                </div>
                <h3 style="color:white; margin-bottom:16px;"><i class="fas fa-lock"></i> Приватность ЛС</h3>
                <div id="privacy-settings" style="margin-bottom:20px;">
                    <div class="privacy-option ${privacySetting === 'all' ? 'active' : ''}" data-privacy="all"><span><i class="fas fa-globe"></i> Все</span><span>Любой может написать</span></div>
                    <div class="privacy-option ${privacySetting === 'friends' ? 'active' : ''}" data-privacy="friends"><span><i class="fas fa-users"></i> Только друзья</span><span>Только те, кто в друзьях</span></div>
                    <div class="privacy-option ${privacySetting === 'mutual' ? 'active' : ''}" data-privacy="mutual"><span><i class="fas fa-handshake"></i> Только взаимные</span><span>Взаимная подписка</span></div>
                    <div class="privacy-option ${privacySetting === 'followers' ? 'active' : ''}" data-privacy="followers"><span><i class="fas fa-rss"></i> Только подписчики</span><span>Кто подписан на вас</span></div>
                </div>
                <h3 style="color:white; margin-bottom:16px;"><i class="fas fa-user-friends"></i> Друзья</h3>
                <button id="show-friend-requests" class="action-btn" style="width:100%; margin-bottom:20px;"><i class="fas fa-envelope"></i> Запросы в друзья</button>
                <h3 style="color:white; margin-bottom:16px;"><i class="fas fa-key"></i> Безопасность</h3>
                <div style="background:rgba(80,180,120,0.1); border-radius:24px; padding:16px;">
                    <input type="password" id="old-password" class="auth-input" placeholder="Старый пароль">
                    <input type="password" id="new-password" class="auth-input" placeholder="Новый пароль">
                    <input type="password" id="confirm-password" class="auth-input" placeholder="Подтвердите">
                    <button class="action-btn" id="change-password-btn" style="width:100%;"><i class="fas fa-save"></i> Сменить пароль</button>
                    <div id="password-change-message" style="color:#94a3b8; font-size:0.9rem; margin-top:8px;"></div>
                </div>
                <hr style="margin:20px 0; border-color:rgba(80,180,120,0.3);">
                <div style="text-align:center;">
                    <a href="https://t.me/kempentyio" target="_blank" style="color:#6ee7b7; text-decoration:none;"><i class="fab fa-telegram"></i> Telegram-канал проекта</a>
                </div>
            </div>
        `;
        document.querySelectorAll('.theme-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                currentTheme = btn.dataset.theme;
                document.body.className = `theme-${currentTheme}`;
                localStorage.setItem('kim_theme', currentTheme);
                renderSettings();
            });
        });
        document.querySelectorAll('.privacy-option').forEach(opt => {
            opt.addEventListener('click', async () => {
                const privacy = opt.dataset.privacy;
                await usersRef.child(currentUser).child('privacySetting').set(privacy);
                currentUserData.privacySetting = privacy;
                renderSettings();
            });
        });
        document.getElementById('show-friend-requests').addEventListener('click', () => showFriendRequests());
        document.getElementById('change-password-btn').addEventListener('click', async () => {
            const old = document.getElementById('old-password').value.trim();
            const nw = document.getElementById('new-password').value.trim();
            const conf = document.getElementById('confirm-password').value.trim();
            const msg = document.getElementById('password-change-message');
            if (!old || !nw || !conf) { msg.textContent = 'Заполните все поля'; msg.style.color = '#f87171'; return; }
            if (nw !== conf) { msg.textContent = 'Новый пароль и подтверждение не совпадают'; msg.style.color = '#f87171'; return; }
            const hashedOld = await hashPassword(old);
            if (currentUserData.password !== hashedOld) { msg.textContent = 'Неверный старый пароль'; msg.style.color = '#f87171'; return; }
            const hashedNew = await hashPassword(nw);
            await usersRef.child(currentUser).child('password').set(hashedNew);
            msg.textContent = '✅ Пароль изменён'; msg.style.color = '#6ee7b7';
            document.getElementById('old-password').value = '';
            document.getElementById('new-password').value = '';
            document.getElementById('confirm-password').value = '';
        });
    }

    // Закрытие модальных окон
    closeFriendsModal.addEventListener('click', () => friendsModal.classList.add('hidden'));
    closeFrameModal.addEventListener('click', () => frameModal.classList.add('hidden'));
    closeNotifications.addEventListener('click', () => notificationsModal.classList.add('hidden'));
</script>
</body>
</html>
