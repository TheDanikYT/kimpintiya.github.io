<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Кимпиньтяо</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6px;
            transition: all 0.3s;
        }

        body.theme-dark { background: #0f172a; }
        body.theme-dark .app-container { background: rgba(30, 41, 59, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        body.theme-light { background: #e2e8f0; }
        body.theme-light .app-container { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(0, 0, 0, 0.1); }
        body.theme-light .message { background: rgba(0, 0, 0, 0.05); color: #1e293b; }
        body.theme-light .message.out { background: linear-gradient(145deg, #38bdf8, #0284c7); color: white; }
        
        body.theme-gradient { background: linear-gradient(145deg, #1e293b, #0f172a); }
        body.theme-gradient .app-container { background: linear-gradient(145deg, #1e293b, #0f172a); border: 1px solid #475569; }
        
        body.theme-cyberpunk {
            background: linear-gradient(45deg, #ff0066, #00ffcc, #ff00ff, #00ccff);
            background-size: 400% 400%;
            animation: gradientShift 5s ease infinite;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        body.theme-cyberpunk .app-container {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(30px);
            border: 2px solid rgba(0, 255, 255, 0.5);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
            animation: borderPulse 2s ease-in-out infinite;
        }
        @keyframes borderPulse {
            0%, 100% { border-color: rgba(0, 255, 255, 0.5); box-shadow: 0 0 30px rgba(0, 255, 255, 0.3); }
            50% { border-color: rgba(255, 0, 255, 0.8); box-shadow: 0 0 50px rgba(255, 0, 255, 0.5); }
        }
        body.theme-cyberpunk .message {
            background: rgba(0, 255, 255, 0.2);
            border: 1px solid #0ff;
            backdrop-filter: blur(10px);
        }
        body.theme-cyberpunk .message.out {
            background: linear-gradient(135deg, #ff0066, #ff00cc);
            border: 1px solid #ff00ff;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            height: 96vh;
            border-radius: 36px;
            box-shadow: 0 25px 50px -12px black;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .auth-screen {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #1e293b, #0f172a);
            padding: 20px;
        }
        .auth-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 40px 24px;
            border-radius: 48px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .auth-box h1 {
            font-size: 2.8rem;
            font-weight: 800;
            text-align: center;
            background: linear-gradient(135deg, #a5f3fc, #bae6fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .auth-input {
            width: 100%;
            padding: 16px 20px;
            border: none;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
            margin-bottom: 12px;
            outline: none;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .auth-buttons {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        .auth-btn {
            flex: 1;
            background: linear-gradient(145deg, #38bdf8, #0284c7);
            border: none;
            color: white;
            font-weight: 600;
            padding: 14px;
            border-radius: 30px;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 5px 0 #0c4a6e;
            transition: 0.1s;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .auth-btn.secondary {
            background: linear-gradient(145deg, #475569, #334155);
            box-shadow: 0 5px 0 #1e293b;
        }
        .auth-btn:active { transform: translateY(4px); box-shadow: 0 1px 0 #0c4a6e; }
        .error-message {
            color: #f87171;
            font-size: 0.9rem;
            margin-top: 12px;
            text-align: center;
        }

        .chat-app {
            height: 100%;
            display: flex;
            flex-direction: column;
            background: transparent;
        }
        .chat-header {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .app-name {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #a5f3fc, #bae6fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-right: auto;
        }
        .current-user {
            background: rgba(255,255,255,0.1);
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: 600;
            color: #dbe9ff;
            font-size: 0.9rem;
            border: 1px solid rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }
        .verified-badge {
            background: #0ea5e9;
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-left: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        .icon-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: #e2e8f0;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.15);
            flex-shrink: 0;
            position: relative;
        }
        .badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ef4444;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #1e293b;
        }

        .tabs {
            display: flex;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 6px 6px;
            gap: 4px;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 10px 0;
            font-size: 1.3rem;
            color: #94a3b8;
            border-radius: 40px;
            cursor: pointer;
        }
        .tab.active {
            background: rgba(255,255,255,0.15);
            color: #38bdf8;
        }

        .tab-content {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scrollbar-width: thin;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 8px 4px;
        }
        .message {
            max-width: 85%;
            padding: 10px 16px;
            border-radius: 24px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.1);
            color: #f1f5f9;
            align-self: flex-start;
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }
        .message.out {
            align-self: flex-end;
            background: linear-gradient(145deg, #38bdf8, #0284c7);
        }
        .message-avatar {
            cursor: pointer;
            flex-shrink: 0;
        }
        .message-content {
            flex: 1;
        }
        .message .sender {
            font-size: 0.75rem;
            color: #bae6fd;
            font-weight: 600;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .message-image {
            max-width: 180px;
            border-radius: 16px;
            margin-top: 5px;
        }
        .message-audio {
            max-width: 200px;
            height: 40px;
            margin-top: 5px;
            border-radius: 20px;
        }
        .invite-message {
            background: linear-gradient(145deg, #38bdf8, #0284c7);
            padding: 12px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }
        .join-btn {
            background: white;
            color: #0284c7;
            border: none;
            padding: 6px 16px;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
        }

        .input-area {
            display: flex;
            gap: 6px;
            align-items: center;
            padding: 8px 10px;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.1);
            flex-wrap: wrap;
        }
        .input-area input {
            flex: 1 1 150px;
            min-width: 120px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 40px;
            padding: 12px 16px;
            color: white;
            font-size: 1rem;
            outline: none;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .action-btn-group {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .circle-btn {
            background: rgba(255,255,255,0.1);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            border: 1px solid rgba(255,255,255,0.2);
            color: #e2e8f0;
            flex-shrink: 0;
            cursor: pointer;
        }
        #pm-send, #chat-send {
            background: linear-gradient(145deg, #38bdf8, #0284c7);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            color: white;
            font-size: 1.4rem;
            box-shadow: 0 5px 0 #0c4a6e;
            flex-shrink: 0;
            cursor: pointer;
        }

        .profile-card, .post-card, .settings-card {
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .avatar-wrapper {
            position: relative;
            display: inline-block;
            border-radius: 50%;
            overflow: hidden;
            background: #334155;
        }
        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }
        .avatar-large {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
        }
        .avatar-placeholder {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: linear-gradient(145deg, #475569, #1e293b);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            color: white;
        }
        
        .frame-10min { border: 4px solid #fbbf24; box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.5); border-radius: 50%; }
        .frame-100h { border: 4px solid #a78bfa; box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.5); border-radius: 50%; }
        .frame-500h { border: 4px solid #ec489a; box-shadow: 0 0 0 3px rgba(236, 72, 153, 0.5); border-radius: 50%; animation: framePulse 2s ease-in-out infinite; }
        .frame-1000h { border: 4px solid #14b8a6; box-shadow: 0 0 0 3px #0d9488, 0 0 0 6px #2dd4bf; border-radius: 50%; animation: frameGlow 1.5s ease-in-out infinite; }
        @keyframes framePulse {
            0%, 100% { box-shadow: 0 0 0 3px rgba(236, 72, 153, 0.5); }
            50% { box-shadow: 0 0 0 8px rgba(236, 72, 153, 0.8); }
        }
        @keyframes frameGlow {
            0%, 100% { box-shadow: 0 0 0 3px #0d9488, 0 0 0 6px #2dd4bf; }
            50% { box-shadow: 0 0 0 5px #0d9488, 0 0 0 10px #2dd4bf; }
        }
        
        .profile-banner {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 24px;
            margin-bottom: 12px;
            cursor: pointer;
            background: #334155;
        }
        .profile-name {
            font-size: 1.8rem;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 12px;
        }
        .profile-bio { color: #cbd5e1; text-align: center; margin: 8px 0; }
        .stat-value { font-size: 1.4rem; color: #38bdf8; }
        .action-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 10px 18px;
            border-radius: 40px;
            cursor: pointer;
            margin: 4px;
            font-size: 0.9rem;
        }
        .admin-btn {
            background: #fbbf24;
            color: #0f172a;
            border: none;
        }

        .dialog-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: rgba(255,255,255,0.07);
            border-radius: 30px;
            margin-bottom: 6px;
            cursor: pointer;
        }

        .search-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        .search-input {
            flex: 1;
            padding: 12px 18px;
            border-radius: 40px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
        }

        .hashtag {
            color: #38bdf8;
            font-weight: 600;
        }

        .game-modal, .call-modal, .notifications-modal, .frame-modal, .friends-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(15px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
        }
        .game-card, .notifications-card, .frame-card, .friends-card {
            background: rgba(255,255,255,0.1);
            border-radius: 48px;
            padding: 25px;
            width: 100%;
            max-width: 340px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin: 15px 0;
        }
        .cell {
            aspect-ratio: 1;
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: #38bdf8;
            border: 2px solid rgba(255,255,255,0.2);
            cursor: pointer;
        }
        .frame-option {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 15px;
            margin: 10px 0;
            cursor: pointer;
            text-align: center;
        }
        .frame-option.locked {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .friend-request {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 12px;
            margin: 8px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .privacy-option {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 12px;
            margin: 8px 0;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .privacy-option.active {
            background: rgba(56, 189, 248, 0.3);
            border: 1px solid #38bdf8;
        }
        .hidden { display: none !important; }

        @media (max-width: 400px) {
            .app-name { font-size: 1.5rem; }
            .circle-btn { width: 38px; height: 38px; font-size: 1.3rem; }
        }
    </style>
</head>
<body class="theme-dark">
<div class="app-container">
    <div id="auth-screen" class="auth-screen">
        <div class="auth-box">
            <h1>Кимпиньтяо</h1>
            <input type="text" id="login-username" class="auth-input" placeholder="Имя">
            <input type="password" id="login-password" class="auth-input" placeholder="Пароль">
            <div class="auth-buttons">
                <button id="login-btn" class="auth-btn">Войти</button>
                <button id="register-btn" class="auth-btn secondary">Регистрация</button>
            </div>
            <div id="auth-error" class="error-message"></div>
            <div id="firebase-status" style="color:#fbbf24; font-size:0.8rem; text-align:center; margin-top:8px;"></div>
        </div>
    </div>

    <div id="chat-app" class="chat-app hidden">
        <div class="chat-header">
            <span class="app-name">Кимпиньтяо</span>
            <span class="current-user" id="current-user-display"></span>
            <button class="icon-btn" id="notifications-btn" title="Уведомления">🔔<span id="notifications-badge" class="badge hidden">0</span></button>
            <button class="icon-btn" id="logout-btn" title="Выйти">↪</button>
        </div>

        <div id="dynamic-content" class="tab-content"></div>

        <div class="tabs">
            <div class="tab active" data-tab="dialogs">💬</div>
            <div class="tab" data-tab="feed">📰</div>
            <div class="tab" data-tab="chat">🌍</div>
            <div class="tab" data-tab="profile">👤</div>
            <div class="tab" data-tab="settings">⚙️</div>
        </div>
    </div>

    <div id="game-modal" class="game-modal hidden">
        <div class="game-card">
            <div style="display:flex; justify-content:space-between;">
                <span style="color:white; font-size:2rem;">🎮</span>
                <button class="icon-btn" id="close-game" style="width:40px;height:40px;">✕</button>
            </div>
            <div id="game-status" style="color:white; text-align:center; margin:15px 0;">Крестики-нолики</div>
            <div class="game-board" id="game-board"></div>
            <button class="action-btn" id="reset-game" style="width:100%;">Новая игра</button>
        </div>
    </div>

    <div id="call-modal" class="call-modal hidden">
        <div class="game-card" style="max-width:400px;">
            <div style="display:flex; justify-content:space-between;">
                <span style="color:white; font-size:2rem;">📞</span>
                <button class="icon-btn" id="close-call-modal" style="width:40px;height:40px;">✕</button>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:15px 0;">
                <div style="background:#1e293b; border-radius:30px; aspect-ratio:1/1; overflow:hidden;">
                    <video id="local-video" autoplay muted playsinline style="width:100%; height:100%; object-fit:cover;"></video>
                </div>
                <div id="remote-video-container" style="background:#1e293b; border-radius:30px; display:flex; align-items:center; justify-content:center; color:#94a3b8;">👤 Ожидание...</div>
            </div>
            <div style="display:flex; gap:15px; justify-content:center;">
                <button class="circle-btn" id="toggle-video" style="width:55px;height:55px;">📹</button>
                <button class="circle-btn" id="toggle-audio" style="width:55px;height:55px;">🎤</button>
                <button class="circle-btn" id="end-call-btn" style="background:#c74b4b; width:55px;height:55px;">📴</button>
            </div>
        </div>
    </div>

    <div id="notifications-modal" class="notifications-modal hidden">
        <div class="notifications-card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <span style="color:white; font-size:1.8rem;">🔔 Уведомления</span>
                <button class="icon-btn" id="close-notifications" style="width:40px;height:40px;">✕</button>
            </div>
            <div id="notifications-list" style="color:white;"></div>
        </div>
    </div>

    <div id="frame-modal" class="frame-modal hidden">
        <div class="frame-card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <span style="color:white; font-size:1.5rem;">🖼️ Выбор рамки</span>
                <button class="icon-btn" id="close-frame-modal" style="width:40px;height:40px;">✕</button>
            </div>
            <div id="frame-options"></div>
        </div>
    </div>

    <div id="friends-modal" class="friends-modal hidden">
        <div class="friends-card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <span style="color:white; font-size:1.5rem;">👥 Запросы в друзья</span>
                <button class="icon-btn" id="close-friends-modal" style="width:40px;height:40px;">✕</button>
            </div>
            <div id="friend-requests-list"></div>
        </div>
    </div>
</div>

<script>
    // ================== ЗАЩИТА ОТ F12 ==================
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', function(e) {
        if (e.key === 'F12' || 
            (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) || 
            (e.ctrlKey && e.key === 'U')) {
            e.preventDefault();
            return false;
        }
    });

    // ================== ХЕШИРОВАНИЕ ПАРОЛЕЙ ==================
    async function hashPassword(password) {
        const encoder = new TextEncoder();
        const data = encoder.encode(password);
        const hashBuffer = await crypto.subtle.digest('SHA-256', data);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // ================== КУКИ ==================
    function setCookie(name, value, days) {
        const expires = new Date();
        expires.setTime(expires.getTime() + days * 24 * 60 * 60 * 1000);
        document.cookie = `${name}=${value};expires=${expires.toUTCString()};path=/;SameSite=Strict`;
    }
    function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
        return null;
    }
    function deleteCookie(name) {
        document.cookie = `${name}=;expires=Thu, 01 Jan 1970 00:00:00 UTC;path=/`;
    }

    // ================== ВСПОМОГАТЕЛЬНЫЕ ==================
    function escapeHtml(unsafe) {
        if (!unsafe) return '';
        return unsafe.replace(/[&<>]/g, m => {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }
    function timeAgo(timestamp) {
        const diff = Date.now() - timestamp;
        if (diff < 60000) return 'только что';
        if (diff < 3600000) return Math.floor(diff/60000)+' мин назад';
        if (diff < 86400000) return Math.floor(diff/3600000)+' ч назад';
        return new Date(timestamp).toLocaleDateString();
    }

    async function canSendMessage(toUser) {
        const toUserSnap = await usersRef.child(toUser).once('value');
        const toUserData = toUserSnap.val();
        if (!toUserData) return false;
        
        const privacy = toUserData.privacySetting || 'all';
        
        if (privacy === 'all') return true;
        
        const friends = toUserData.friends || [];
        const followers = toUserData.followers || [];
        const following = toUserData.following || [];
        
        switch(privacy) {
            case 'friends':
                return friends.includes(currentUser);
            case 'mutual':
                return friends.includes(currentUser) && following.includes(toUser);
            case 'followers':
                return followers.includes(currentUser);
            default:
                return true;
        }
    }

    // ================== ЗАПРОСЫ В ДРУЗЬЯ ==================
    async function sendFriendRequest(toUser) {
        if (toUser === currentUser) {
            alert('Нельзя добавить себя в друзья');
            return;
        }
        
        const currentFriends = currentUserData.friends || [];
        if (currentFriends.includes(toUser)) {
            alert('Этот пользователь уже у вас в друзьях');
            return;
        }
        
        const existingRequests = currentUserData.sentFriendRequests || [];
        if (existingRequests.includes(toUser)) {
            alert('Запрос уже отправлен');
            return;
        }
        
        const toUserSnap = await usersRef.child(toUser).once('value');
        const toUserData = toUserSnap.val();
        if (!toUserData) {
            alert('Пользователь не найден');
            return;
        }
        
        const incomingRequests = toUserData.incomingFriendRequests || [];
        if (incomingRequests.includes(currentUser)) {
            alert('Запрос уже существует');
            return;
        }
        incomingRequests.push(currentUser);
        await usersRef.child(toUser).child('incomingFriendRequests').set(incomingRequests);
        
        const sentRequests = currentUserData.sentFriendRequests || [];
        sentRequests.push(toUser);
        await usersRef.child(currentUser).child('sentFriendRequests').set(sentRequests);
        currentUserData.sentFriendRequests = sentRequests;
        
        await addNotification(toUser, { type: 'friend', text: `${currentUser} хочет добавить вас в друзья!` });
        
        alert(`Запрос в друзья отправлен пользователю ${toUser}`);
        
        if (viewingProfile === toUser) {
            renderProfile(toUser, false);
        }
    }

    async function acceptFriendRequest(fromUser) {
        const currentSnap = await usersRef.child(currentUser).once('value');
        const currentData = currentSnap.val();
        
        const fromSnap = await usersRef.child(fromUser).once('value');
        const fromData = fromSnap.val();
        
        if (!currentData || !fromData) return;
        
        const incoming = currentData.incomingFriendRequests || [];
        const newIncoming = incoming.filter(u => u !== fromUser);
        await usersRef.child(currentUser).child('incomingFriendRequests').set(newIncoming);
        
        const sentFrom = fromData.sentFriendRequests || [];
        const newSentFrom = sentFrom.filter(u => u !== currentUser);
        await usersRef.child(fromUser).child('sentFriendRequests').set(newSentFrom);
        
        const currentFriends = currentData.friends || [];
        if (!currentFriends.includes(fromUser)) {
            currentFriends.push(fromUser);
            await usersRef.child(currentUser).child('friends').set(currentFriends);
        }
        
        const fromFriends = fromData.friends || [];
        if (!fromFriends.includes(currentUser)) {
            fromFriends.push(currentUser);
            await usersRef.child(fromUser).child('friends').set(fromFriends);
        }
        
        currentUserData.friends = currentFriends;
        currentUserData.incomingFriendRequests = newIncoming;
        
        await addNotification(fromUser, { type: 'friend', text: `${currentUser} принял ваш запрос в друзья!` });
        
        alert(`Вы теперь друзья с ${fromUser}`);
        
        if (viewingProfile === fromUser) {
            renderProfile(fromUser, false);
        }
        renderSettings();
    }

    async function startOnlineTracking() {
        if (!currentUser) return;
        onlineStartTime = Date.now();
        window.addEventListener('beforeunload', () => saveOnlineTime());
        const onlineRefUser = onlineRef.child(currentUser);
        onlineRefUser.onDisconnect().set(null);

    async function saveOnlineTime() {
        if (!currentUser || !onlineStartTime) return;
        const elapsed = Date.now() - onlineStartTime;
        if (elapsed < 1000) return;
        const userSnap = await usersRef.child(currentUser).once('value');
        const user = userSnap.val();
        let totalTime = (user.totalOnlineTime || 0) + elapsed;
        await usersRef.child(currentUser).child('totalOnlineTime').set(totalTime);
        onlineStartTime = Date.now();
        await checkAndUnlockFrames(totalTime);
    }

    async function checkAndUnlockFrames(totalTime) {
        const hours = totalTime / (1000 * 3600);
        const frameRequirements = {
            '10min': 10/60,
            '100h': 100,
            '500h': 500,
            '1000h': 1000
        };
        const unlockedFrames = currentUserData.unlockedFrames || [];
        let newFrames = [];
        for (const [frame, req] of Object.entries(frameRequirements)) {
            if (hours >= req && !unlockedFrames.includes(frame)) {
                newFrames.push(frame);
            }
        }
        if (newFrames.length) {
            const updatedFrames = [...unlockedFrames, ...newFrames];
            await usersRef.child(currentUser).child('unlockedFrames').set(updatedFrames);
            currentUserData.unlockedFrames = updatedFrames;
            for (const frame of newFrames) {
                await addNotification(currentUser, { type: 'frame', text: `Вы открыли новую рамку "${getFrameName(frame)}"!` });
            }
        }
    }

    function getFrameName(frameId) {
        const names = { '10min': '🌟 10 минут', '100h': '💜 100 часов', '500h': '💖 500 часов', '1000h': '👑 1000 часов' };
        return names[frameId] || frameId;
    }

    async function login(username, password) {
        if (!checkFirebaseOrShowError()) return;
        if (!username || !password) { showAuthError('Заполните поля'); return; }
        try {
            const snapshot = await usersRef.child(username).once('value');
            const user = snapshot.val();
            if (!user) { showAuthError('Пользователь не найден'); return; }
            const hashedInput = await hashPassword(password);
            if (user.password !== hashedInput) { showAuthError('Неверный пароль'); return; }
            currentUser = username;
            currentUserData = user;
            setCookie('kim_session', username, 30);
            localStorage.setItem('kim_current_user', username);
            authScreen.classList.add('hidden');
            chatApp.classList.remove('hidden');
            currentUserSpan.innerHTML = `<span>${escapeHtml(username)}${user.verified ? '<span class="verified-badge">✓</span>' : ''}</span>`;
            currentUserSpan.style.cursor = 'pointer';
            currentUserSpan.onclick = () => openUserProfile(username);
            onlineRef.child(username).set(true);
            onlineRef.child(username).onDisconnect().remove();
            startOnlineTracking();
            activeTab = 'dialogs';
            renderTab();
            subscribeToNotifications();
        } catch (e) {
            showAuthError('Ошибка: ' + e.message);
        }
    }

    async function markNotificationsAsRead() {
        if (!currentUser) return;
        const snapshot = await notificationsRef.child(currentUser).once('value');
        const notifs = snapshot.val() || {};
        const updates = {};
        Object.keys(notifs).forEach(key => {
            if (!notifs[key].read) updates[`${key}/read`] = true;
        });
        if (Object.keys(updates).length) await notificationsRef.child(currentUser).update(updates);
    }

    function subscribeToNotifications() {
        if (!currentUser) return;
        notificationsRef.child(currentUser).on('value', (snap) => {
            const notifs = snap.val() || {};
            const unread = Object.values(notifs).filter(n => !n.read).length;
            if (unread > 0) {
                notificationsBadge.textContent = unread;
                notificationsBadge.classList.remove('hidden');
            } else {
                notificationsBadge.classList.add('hidden');
            }
        });
    }

    function handlePMFile(e, other) {
        const file = e.target.files[0];
        if (!file) return;
        if (file.size > 5*1024*1024) { alert('Макс 5 МБ'); e.target.value = ''; return; }
        const reader = new FileReader();
        reader.onload = (ev) => {
            const key = [currentUser, other].sort().join('_');
            const type = e.target.id.includes('image') ? 'image' : 'audio';
            const msg = { sender: currentUser, timestamp: Date.now() };
            if (type === 'image') msg.imageUrl = ev.target.result;
            else msg.audioUrl = ev.target.result;
            dialogsRef.child(key).push(msg);
        };
        reader.readAsDataURL(file);
    }

    let pmRecordingStream = null;
    async function startPMRecording(other) {
        if (recording) return;
        try {
            pmRecordingStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(pmRecordingStream);
            recordedChunks = [];
            mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'audio/webm' });
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const key = [currentUser, other].sort().join('_');
                    const msg = { sender: currentUser, audioUrl: ev.target.result, timestamp: Date.now() };
                    dialogsRef.child(key).push(msg);
                    pmRecordingStream.getTracks().forEach(t => t.stop());
                };
                reader.readAsDataURL(blob);
            };
            mediaRecorder.start();
            recording = true;
            document.getElementById('pm-record').style.background = '#c74b4b';
        } catch (err) { alert('Микрофон недоступен'); }
    }
    function stopPMRecording() {
        if (mediaRecorder && recording) {
            mediaRecorder.stop();
            recording = false;
            if (document.getElementById('pm-record')) document.getElementById('pm-record').style.background = '';
        }
    }

    // ================== ЗВОНКИ ==================
    async function startCall(callId, targetUser) {
        if (peerConnection) peerConnection.close();
        currentCallId = callId;
        const configuration = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
        peerConnection = new RTCPeerConnection(configuration);

        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById('local-video').srcObject = localStream;
        localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

        peerConnection.ontrack = event => {
            const remoteVideo = document.createElement('video');
            remoteVideo.autoplay = true;
            remoteVideo.playsInline = true;
            remoteVideo.srcObject = event.streams[0];
            const container = document.getElementById('remote-video-container');
            container.innerHTML = '';
            container.appendChild(remoteVideo);
            remoteVideo.style.width = '100%';
            remoteVideo.style.height = '100%';
            remoteVideo.style.objectFit = 'cover';
        };

        peerConnection.onicecandidate = event => {
            if (event.candidate) {
                callsRef.child(callId).child('candidates').push(event.candidate.toJSON());
            }
        };

        if (targetUser) {
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            await callsRef.child(callId).set({
                from: currentUser,
                to: targetUser,
                offer: offer,
                status: 'pending'
            });
        } else {
            await callsRef.child(callId).set({
                from: currentUser,
                to: null,
                status: 'waiting'
            });
        }

        const callRef = callsRef.child(callId);
        callRef.on('value', async (snap) => {
            const data = snap.val();
            if (!data) return;
            if (data.status === 'accepted' && data.answer && peerConnection.signalingState !== 'stable') {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
            } else if (data.offer && data.to === currentUser && peerConnection.signalingState === 'stable') {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                await callRef.child('answer').set(answer);
                await callRef.child('status').set('accepted');
            }
            if (data.candidates) {
                Object.values(data.candidates).forEach(candidate => {
                    peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
                });
            }
        });
        
        callModal.classList.remove('hidden');
    }

    async function endCall() {
        if (peerConnection) {
            peerConnection.close();
            peerConnection = null;
        }
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
            localStream = null;
        }
        if (currentCallId) {
            await callsRef.child(currentCallId).remove();
            currentCallId = null;
        }
        callModal.classList.add('hidden');
    }

    function checkWin(board) {
        const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
        for (let l of lines) {
            if (board[l[0]] && board[l[0]] === board[l[1]] && board[l[1]] === board[l[2]]) return true;
        }
        return false;
    }

    async function joinGame(gameId) {
        currentGameId = gameId;
        gameModal.classList.remove('hidden');
        if (currentGameListener) currentGameListener();
        const gameRef = gamesRef.child(gameId);
        const snap = await gameRef.once('value');
        const game = snap.val();
        if (!game) return;

        if (game.players[1] === null && game.players[0] !== currentUser) {
            await gameRef.child('players').child('1').set(currentUser);
            await gameRef.child('status').set('playing');
        }
        currentGameListener = gameRef.on('value', (snap) => {
            const gameData = snap.val();
            if (gameData) renderGameBoard(gameData);
        });
    }

    function renderGameBoard(game) {
        const boardDiv = document.getElementById('game-board');
        let html = '';
        for (let i = 0; i < 9; i++) {
            html += `<div class="cell" data-index="${i}">${game.board[i]}</div>`;
        }
        boardDiv.innerHTML = html;
        const statusText = game.status === 'waiting' ? 'Ожидание игрока...' :
                           game.status === 'over' ? 'Игра окончена' :
                           `Ход: ${game.currentPlayer === currentUser ? 'Ваш ход' : 'Ход соперника'}`;
        document.getElementById('game-status').innerText = statusText;

        document.querySelectorAll('.cell').forEach(cell => {
            cell.addEventListener('click', async () => {
                if (game.status !== 'playing') return;
                if (game.currentPlayer !== currentUser) { alert('Не ваш ход'); return; }
                const idx = cell.dataset.index;
                if (game.board[idx] !== '') return;
                const newBoard = [...game.board];
                newBoard[idx] = game.turn;
                const nextTurn = game.turn === 'X' ? 'O' : 'X';
                const nextPlayer = game.players[0] === currentUser ? game.players[1] : game.players[0];
                await gamesRef.child(currentGameId).update({
                    board: newBoard,
                    turn: nextTurn,
                    currentPlayer: nextPlayer
                });
                if (checkWin(newBoard)) {
                    await gamesRef.child(currentGameId).child('status').set('over');
                    alert(`Победил ${game.turn === 'X' ? '✖' : '◯'}!`);
                } else if (!newBoard.includes('')) {
                    await gamesRef.child(currentGameId).child('status').set('over');
                    alert('Ничья');
                }
            });
        });
    }

                    if (post.author !== currentUser) return;
                    const newPinned = !post.pinned;
                    if (newPinned) {
                        const allPosts = await postsRef.once('value');
                        allPosts.forEach(p => {
                            if (p.val().pinned && p.val().author === currentUser) {
                                postsRef.child(p.key).child('pinned').set(false);
                            }
                        });
                    }
                    await postsRef.child(postId).child('pinned').set(newPinned);
                });
            });
        });
    }

    // ================== ПРОФИЛЬ ==================
    async function renderProfile(username, isOwn) {
        const userSnap = await usersRef.child(username).once('value');
        const user = userSnap.val();
        if (!user) return;

        const postsSnap = await postsRef.orderByChild('author').equalTo(username).once('value');
        const postsCount = postsSnap.numChildren();

        const frameClass = getUserFrameClass(user);

        let html = `
            <div class="profile-card">
                ${user.banner ? `<img src="${user.banner}" class="profile-banner" id="banner-img" style="cursor:pointer;">` : `<div class="profile-banner" id="banner-placeholder" style="background:#334155; display:flex; align-items:center; justify-content:center; color:white; cursor:pointer;">Баннер</div>`}
                <div style="display:flex; justify-content:center; margin-top:-45px;">
                    <div class="avatar-wrapper ${frameClass}" style="width:90px; height:90px; cursor:pointer;" id="avatar-wrapper">
                        ${user.avatar ? `<img src="${user.avatar}" style="width:100%; height:100%; object-fit:cover; border-radius:50%;">` : `<div style="width:100%; height:100%; background:linear-gradient(145deg,#475569,#1e293b); display:flex; align-items:center; justify-content:center; color:white; font-size:2.5rem;">${username.charAt(0).toUpperCase()}</div>`}
                    </div>
                </div>
                <div class="profile-name">${escapeHtml(username)}${user.verified ? '<span class="verified-badge">✓</span>' : ''}</div>
                <div class="profile-bio">${escapeHtml(user.bio || 'Нет описания')}</div>
                <div class="profile-stats" style="display:flex; justify-content:space-around; margin:12px 0;">
                    <div style="text-align:center;"><span class="stat-value">${postsCount}</span><br>постов</div>
                    <div style="text-align:center;"><span class="stat-value">${user.friends ? user.friends.length : 0}</span><br>друзей</div>
                    <div style="text-align:center;"><span class="stat-value">${user.followers ? user.followers.length : 0}</span><br>подписчиков</div>
                    <div style="text-align:center;"><span class="stat-value">${Math.floor((user.totalOnlineTime || 0) / (1000*3600))}</span><br>часов</div>
                </div>
        `;
        if (!isOwn) {
            const isFollowing = user.followers && user.followers.includes(currentUser);
            const isFriend = user.friends && user.friends.includes(currentUser);
            html += `<div style="display:flex; flex-wrap:wrap; justify-content:center; gap:8px;">`;
            if (!isFriend) html += `<button class="action-btn" id="add-friend">➕ В друзья</button>`;
            else html += `<button class="action-btn" id="remove-friend">❌ Удалить из друзей</button>`;
            if (!isFollowing) html += `<button class="action-btn" id="follow">🔔 Подписаться</button>`;
            else html += `<button class="action-btn" id="unfollow">🔕 Отписаться</button>`;
            html += `<button class="action-btn" id="send-message">💬 Написать</button>`;
            if (currentUserData && currentUserData.isAdmin && !user.verified) {
                html += `<button class="action-btn admin-btn" id="grant-verify">⭐ Выдать галочку</button>`;
            }
            html += `</div>`;
        } else {
            html += `<div style="display:flex; flex-wrap:wrap; justify-content:center; gap:8px;">
                        <button class="action-btn" id="edit-profile">✏️ Редактировать</button>
                        <button class="action-btn" id="change-banner">🖼️ Сменить баннер</button>
                        <button class="action-btn" id="change-avatar">🖼️ Сменить аватар</button>
                        <button class="action-btn" id="select-frame">🖼️ Выбрать рамку</button>
                     </div>`;
        }
        html += `</div>`;
        
        // Добавляем контейнер для постов
        html += `<div id="user-posts-container" style="margin-top:20px;"></div>`;
        
        dynamicContent.innerHTML = html;

        // Рендерим посты
        const postsContainer = document.getElementById('user-posts-container');
        if (postsContainer) {
            await renderUserPosts(username, postsContainer);
        }

        if (isOwn) {
            document.getElementById('change-avatar').addEventListener('click', () => uploadMedia('avatar'));
            document.getElementById('change-banner').addEventListener('click', () => uploadMedia('banner'));
            document.getElementById('select-frame').addEventListener('click', () => openFrameSelector());
            document.getElementById('edit-profile').addEventListener('click', () => {
                const newBio = prompt('Введите новое описание:', user.bio || '');
                if (newBio !== null) {
                    usersRef.child(currentUser).child('bio').set(newBio);
                    renderProfile(currentUser, true);
                }
            });
            if (document.getElementById('avatar-wrapper')) {
                document.getElementById('avatar-wrapper').addEventListener('click', () => uploadMedia('avatar'));
            }
            if (document.getElementById('banner-img') || document.getElementById('banner-placeholder')) {
                const bannerEl = document.getElementById('banner-img') || document.getElementById('banner-placeholder');
                bannerEl.addEventListener('click', () => uploadMedia('banner'));
            }
        } else {
            if (document.getElementById('add-friend')) document.getElementById('add-friend').addEventListener('click', async () => {
                await sendFriendRequest(username);
            });
            if (document.getElementById('remove-friend')) document.getElementById('remove-friend').addEventListener('click', async () => {
                await removeFriend(username);
            });
            if (document.getElementById('follow')) document.getElementById('follow').addEventListener('click', async () => {
                await usersRef.child(username).child('followers').transaction(arr => {
                    if (!arr) arr = [];
                    if (!arr.includes(currentUser)) arr.push(currentUser);
                    return arr;
                });
                await usersRef.child(currentUser).child('following').transaction(arr => {
                    if (!arr) arr = [];
                    if (!arr.includes(username)) arr.push(username);
                    return arr;
                });
                renderProfile(username, false);
            });
            if (document.getElementById('unfollow')) document.getElementById('unfollow').addEventListener('click', async () => {
                await usersRef.child(username).child('followers').transaction(arr => {
                    if (arr) return arr.filter(u => u !== currentUser);
                    return arr;
                });
                await usersRef.child(currentUser).child('following').transaction(arr => {
                    if (arr) return arr.filter(u => u !== username);
                    return arr;
                });
                renderProfile(username, false);
            });
            if (document.getElementById('send-message')) document.getElementById('send-message').addEventListener('click', async () => {
                const canSend = await canSendMessage(username);
                if (!canSend) {
                    alert(`Пользователь ${username} ограничил возможность писать вам.`);
                    return;
                }
                currentDialog = username;
                renderPrivateChat(username);
            });
            if (document.getElementById('grant-verify')) {
                document.getElementById('grant-verify').addEventListener('click', async () => {
                    await usersRef.child(username).child('verified').set(true);
                    await addNotification(username, { type: 'verify', text: `Администратор выдал вам галочку!` });
                    renderProfile(username, false);
                });
            }
        }
    }

    function uploadMedia(type) {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*,image/gif';
        input.onchange = async (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    await usersRef.child(currentUser).child(type).set(ev.target.result);
                    renderProfile(currentUser, true);
                };
                reader.readAsDataURL(file);
            }
        };
        input.click();
    }

    async function openFrameSelector() {
        const unlocked = currentUserData.unlockedFrames || [];
        const current = currentUserData.currentFrame;
        const frameOptions = [
            { id: '10min', name: '🌟 10 минут онлайн', req: '10 минут' },
            { id: '100h', name: '💜 100 часов онлайн', req: '100 часов' },
            { id: '500h', name: '💖 500 часов онлайн', req: '500 часов' },
            { id: '1000h', name: '👑 1000 часов онлайн', req: '1000 часов' }
        ];
        
        let html = '';
        for (const opt of frameOptions) {
            const isUnlocked = unlocked.includes(opt.id);
            const isActive = current === opt.id;
            html += `
                <div class="frame-option ${!isUnlocked ? 'locked' : ''}" data-frame="${opt.id}" ${!isUnlocked ? '' : 'style="cursor:pointer;"'}>
                    <div class="avatar-wrapper ${isUnlocked ? opt.id === '10min' ? 'frame-10min' : opt.id === '100h' ? 'frame-100h' : opt.id === '500h' ? 'frame-500h' : 'frame-1000h' : ''}" style="width:60px; height:60px; margin:0 auto 10px auto;">
                        <div style="width:100%; height:100%; background:linear-gradient(145deg,#475569,#1e293b); border-radius:50%;"></div>
                    </div>
                    <div style="color:white; font-weight:bold;">${opt.name}</div>
                    <div style="color:#94a3b8; font-size:0.8rem;">Требуется: ${opt.req}</div>
                    ${isActive ? '<div style="color:#38bdf8; margin-top:5px;">✓ Активна</div>' : ''}
                    ${!isUnlocked ? '<div style="color:#f87171; margin-top:5px;">🔒 Заблокировано</div>' : ''}
                </div>
            `;
        }
        
        document.getElementById('frame-options').innerHTML = html;
        frameModal.classList.remove('hidden');
        
        document.querySelectorAll('.frame-option:not(.locked)').forEach(el => {
            el.addEventListener('click', async () => {
                const frameId = el.dataset.frame;
                if (frameId) {
                    await usersRef.child(currentUser).child('currentFrame').set(frameId);
                    currentUserData.currentFrame = frameId;
                    frameModal.classList.add('hidden');
                    renderProfile(currentUser, true);
                }
            });
        });
    }

                const privacy = opt.dataset.privacy;
                await usersRef.child(currentUser).child('privacySetting').set(privacy);
                currentUserData.privacySetting = privacy;
                renderSettings();
            });
        });
        
        document.getElementById('show-friend-requests').addEventListener('click', () => showFriendRequests());
        
        document.getElementById('change-password-btn').addEventListener('click', async () => {
            const old = document.getElementById('old-password').value.trim();
            const nw = document.getElementById('new-password').value.trim();
            const conf = document.getElementById('confirm-password').value.trim();
            const msg = document.getElementById('password-change-message');
            if (!old || !nw || !conf) { msg.textContent = 'Заполните все поля'; msg.style.color = '#f87171'; return; }
            if (nw !== conf) { msg.textContent = 'Новый пароль и подтверждение не совпадают'; msg.style.color = '#f87171'; return; }
            const hashedOld = await hashPassword(old);
            if (currentUserData.password !== hashedOld) { msg.textContent = 'Неверный старый пароль'; msg.style.color = '#f87171'; return; }
            const hashedNew = await hashPassword(nw);
            await usersRef.child(currentUser).child('password').set(hashedNew);
            msg.textContent = '✅ Пароль изменён'; msg.style.color = '#4ade80';
            document.getElementById('old-password').value = '';
            document.getElementById('new-password').value = '';
            document.getElementById('confirm-password').value = '';
        });
    }

    // Закрытие модальных окон
    if (closeFriendsModal) {
        closeFriendsModal.addEventListener('click', () => {
            friendsModal.classList.add('hidden');
        });
    }
    
    if (closeFrameModal) {
        closeFrameModal.addEventListener('click', () => {
            frameModal.classList.add('hidden');
        });
    }
    
    if (closeNotifications) {
        closeNotifications.addEventListener('click', () => {
            notificationsModal.classList.add('hidden');
        });
    }
    
    const closeGame = document.getElementById('close-game');
    if (closeGame) {
        closeGame.addEventListener('click', () => {
            gameModal.classList.add('hidden');
        });
    }
    
    const closeCallModal = document.getElementById('close-call-modal');
    if (closeCallModal) {
        closeCallModal.addEventListener('click', () => {
            callModal.classList.add('hidden');
        });
    }
    
    const endCallBtn = document.getElementById('end-call-btn');
    if (endCallBtn) {
        endCallBtn.addEventListener('click', endCall);
    }
    
    const toggleVideo = document.getElementById('toggle-video');
    if (toggleVideo) {
        toggleVideo.addEventListener('click', () => {
            if (localStream) {
                const track = localStream.getVideoTracks()[0];
                if (track) track.enabled = !track.enabled;
            }
        });
    }
    
    const toggleAudio = document.getElementById('toggle-audio');
    if (toggleAudio) {
        toggleAudio.addEventListener('click', () => {
            if (localStream) {
                const track = localStream.getAudioTracks()[0];
                if (track) track.enabled = !track.enabled;
            }
        });
    }
    
    const resetGame = document.getElementById('reset-game');
    if (resetGame) {
        resetGame.addEventListener('click', async () => {
            if (currentGameId) {
                await gamesRef.child(currentGameId).update({
                    board: ['','','','','','','','',''],
                    turn: 'X',
                    currentPlayer: currentUser,
                    status: 'playing'
                });
            }
        });
    }

    // Обработка нажатий на кнопки приглашений
    dynamicContent.addEventListener('click', async (e) => {
        if (e.target.classList.contains('join-btn')) {
            const gameId = e.target.dataset.gameid;
            const callId = e.target.dataset.callid;
            if (gameId) {
                await joinGame(gameId);
            } else if (callId) {
                await startCall(callId, null);
            }
        }
    });
</script>
</body>
</html>
