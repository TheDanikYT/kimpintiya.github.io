<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Кимпиньтяо</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6px;
            transition: all 0.3s;
        }

        body.theme-dark { background: #0f172a; }
        body.theme-dark .app-container { background: rgba(30, 41, 59, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        body.theme-light { background: #e2e8f0; }
        body.theme-light .app-container { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(0, 0, 0, 0.1); }
        body.theme-light .message { background: rgba(0, 0, 0, 0.05); color: #1e293b; }
        body.theme-light .message.out { background: linear-gradient(145deg, #38bdf8, #0284c7); color: white; }
        
        body.theme-gradient { background: linear-gradient(145deg, #1e293b, #0f172a); }
        body.theme-gradient .app-container { background: linear-gradient(145deg, #1e293b, #0f172a); border: 1px solid #475569; }
        
        body.theme-cyberpunk {
            background: linear-gradient(45deg, #ff0066, #00ffcc, #ff00ff, #00ccff);
            background-size: 400% 400%;
            animation: gradientShift 5s ease infinite;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        body.theme-cyberpunk .app-container {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(30px);
            border: 2px solid rgba(0, 255, 255, 0.5);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
            animation: borderPulse 2s ease-in-out infinite;
        }
        @keyframes borderPulse {
            0%, 100% { border-color: rgba(0, 255, 255, 0.5); box-shadow: 0 0 30px rgba(0, 255, 255, 0.3); }
            50% { border-color: rgba(255, 0, 255, 0.8); box-shadow: 0 0 50px rgba(255, 0, 255, 0.5); }
        }
        body.theme-cyberpunk .message {
            background: rgba(0, 255, 255, 0.2);
            border: 1px solid #0ff;
            backdrop-filter: blur(10px);
        }
        body.theme-cyberpunk .message.out {
            background: linear-gradient(135deg, #ff0066, #ff00cc);
            border: 1px solid #ff00ff;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            height: 96vh;
            border-radius: 36px;
            box-shadow: 0 25px 50px -12px black;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .auth-screen {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #1e293b, #0f172a);
            padding: 20px;
        }
        .auth-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 40px 24px;
            border-radius: 48px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .auth-box h1 {
            font-size: 2.8rem;
            font-weight: 800;
            text-align: center;
            background: linear-gradient(135deg, #a5f3fc, #bae6fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .auth-input {
            width: 100%;
            padding: 16px 20px;
            border: none;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
            margin-bottom: 12px;
            outline: none;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .auth-buttons {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        .auth-btn {
            flex: 1;
            background: linear-gradient(145deg, #38bdf8, #0284c7);
            border: none;
            color: white;
            font-weight: 600;
            padding: 14px;
            border-radius: 30px;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 5px 0 #0c4a6e;
            transition: 0.1s;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .auth-btn.secondary {
            background: linear-gradient(145deg, #475569, #334155);
            box-shadow: 0 5px 0 #1e293b;
        }
        .auth-btn:active { transform: translateY(4px); box-shadow: 0 1px 0 #0c4a6e; }
        .error-message {
            color: #f87171;
            font-size: 0.9rem;
            margin-top: 12px;
            text-align: center;
        }

        .chat-app {
            height: 100%;
            display: flex;
            flex-direction: column;
            background: transparent;
        }
        .chat-header {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .app-name {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #a5f3fc, #bae6fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-right: auto;
        }
        .current-user {
            background: rgba(255,255,255,0.1);
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: 600;
            color: #dbe9ff;
            font-size: 0.9rem;
            border: 1px solid rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }
        .verified-badge {
            background: #38bdf8;
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-left: 4px;
        }
        .icon-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: #e2e8f0;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.15);
            flex-shrink: 0;
            position: relative;
        }
        .badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ef4444;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #1e293b;
        }

        .tabs {
            display: flex;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 6px 6px;
            gap: 4px;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 10px 0;
            font-size: 1.3rem;
            color: #94a3b8;
            border-radius: 40px;
            cursor: pointer;
        }
        .tab.active {
            background: rgba(255,255,255,0.15);
            color: #38bdf8;
        }

        .tab-content {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scrollbar-width: thin;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 8px 4px;
        }
        .message {
            max-width: 85%;
            padding: 10px 16px;
            border-radius: 24px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.1);
            color: #f1f5f9;
            align-self: flex-start;
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }
        .message.out {
            align-self: flex-end;
            background: linear-gradient(145deg, #38bdf8, #0284c7);
        }
        .message-avatar {
            cursor: pointer;
            flex-shrink: 0;
        }
        .message-content {
            flex: 1;
        }
        .message .sender {
            font-size: 0.75rem;
            color: #bae6fd;
            font-weight: 600;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .message-image {
            max-width: 180px;
            border-radius: 16px;
            margin-top: 5px;
        }
        .message-audio {
            max-width: 200px;
            height: 40px;
            margin-top: 5px;
            border-radius: 20px;
        }
        .invite-message {
            background: linear-gradient(145deg, #38bdf8, #0284c7);
            padding: 12px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }
        .join-btn {
            background: white;
            color: #0284c7;
            border: none;
            padding: 6px 16px;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
        }

        .input-area {
            display: flex;
            gap: 6px;
            align-items: center;
            padding: 8px 10px;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.1);
            flex-wrap: wrap;
        }
        .input-area input {
            flex: 1 1 150px;
            min-width: 120px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 40px;
            padding: 12px 16px;
            color: white;
            font-size: 1rem;
            outline: none;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .action-btn-group {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .circle-btn {
            background: rgba(255,255,255,0.1);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            border: 1px solid rgba(255,255,255,0.2);
            color: #e2e8f0;
            flex-shrink: 0;
            cursor: pointer;
        }
        #pm-send, #chat-send {
            background: linear-gradient(145deg, #38bdf8, #0284c7);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            color: white;
            font-size: 1.4rem;
            box-shadow: 0 5px 0 #0c4a6e;
            flex-shrink: 0;
            cursor: pointer;
        }

        .profile-card, .post-card, .settings-card {
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .avatar-wrapper {
            position: relative;
            display: inline-block;
            border-radius: 50%;
            overflow: hidden;
            background: #334155;
        }
        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }
        .avatar-large {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
        }
        .avatar-placeholder {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: linear-gradient(145deg, #475569, #1e293b);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            color: white;
        }
        
        .frame-10min { border: 4px solid #fbbf24; box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.5); border-radius: 50%; }
        .frame-100h { border: 4px solid #a78bfa; box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.5); border-radius: 50%; }
        .frame-500h { border: 4px solid #ec489a; box-shadow: 0 0 0 3px rgba(236, 72, 153, 0.5); border-radius: 50%; animation: framePulse 2s ease-in-out infinite; }
        .frame-1000h { border: 4px solid #14b8a6; box-shadow: 0 0 0 3px #0d9488, 0 0 0 6px #2dd4bf; border-radius: 50%; animation: frameGlow 1.5s ease-in-out infinite; }
        @keyframes framePulse {
            0%, 100% { box-shadow: 0 0 0 3px rgba(236, 72, 153, 0.5); }
            50% { box-shadow: 0 0 0 8px rgba(236, 72, 153, 0.8); }
        }
        @keyframes frameGlow {
            0%, 100% { box-shadow: 0 0 0 3px #0d9488, 0 0 0 6px #2dd4bf; }
            50% { box-shadow: 0 0 0 5px #0d9488, 0 0 0 10px #2dd4bf; }
        }
        
        .profile-banner {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 24px;
            margin-bottom: 12px;
            cursor: pointer;
            background: #334155;
        }
        .profile-name {
            font-size: 1.8rem;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 12px;
        }
        .profile-bio { color: #cbd5e1; text-align: center; margin: 8px 0; }
        .stat-value { font-size: 1.4rem; color: #38bdf8; }
        .action-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 10px 18px;
            border-radius: 40px;
            cursor: pointer;
            margin: 4px;
            font-size: 0.9rem;
        }
        .admin-btn {
            background: #fbbf24;
            color: #0f172a;
            border: none;
        }

        .dialog-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: rgba(255,255,255,0.07);
            border-radius: 30px;
            margin-bottom: 6px;
            cursor: pointer;
        }

        .search-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        .search-input {
            flex: 1;
            padding: 12px 18px;
            border-radius: 40px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
        }

        .hashtag {
            color: #38bdf8;
            font-weight: 600;
        }

        .game-modal, .call-modal, .notifications-modal, .frame-modal, .friends-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(15px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
        }
        .game-card, .notifications-card, .frame-card, .friends-card {
            background: rgba(255,255,255,0.1);
            border-radius: 48px;
            padding: 25px;
            width: 100%;
            max-width: 340px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin: 15px 0;
        }
        .cell {
            aspect-ratio: 1;
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: #38bdf8;
            border: 2px solid rgba(255,255,255,0.2);
            cursor: pointer;
        }
        .frame-option {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 15px;
            margin: 10px 0;
            cursor: pointer;
            text-align: center;
        }
        .frame-option.locked {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .friend-request {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 12px;
            margin: 8px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .privacy-option {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 12px;
            margin: 8px 0;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .privacy-option.active {
            background: rgba(56, 189, 248, 0.3);
            border: 1px solid #38bdf8;
        }
        .hidden { display: none !important; }

        @media (max-width: 400px) {
            .app-name { font-size: 1.5rem; }
            .circle-btn { width: 38px; height: 38px; font-size: 1.3rem; }
        }
    </style>
</head>
<body class="theme-dark">
<div class="app-container">
    <div id="auth-screen" class="auth-screen">
        <div class="auth-box">
            <h1>Кимпиньтяо</h1>
            <input type="text" id="login-username" class="auth-input" placeholder="Имя">
            <input type="password" id="login-password" class="auth-input" placeholder="Пароль">
            <div class="auth-buttons">
                <button id="login-btn" class="auth-btn">Войти</button>
                <button id="register-btn" class="auth-btn secondary">Регистрация</button>
            </div>
            <div id="auth-error" class="error-message"></div>
            <div id="firebase-status" style="color:#fbbf24; font-size:0.8rem; text-align:center; margin-top:8px;"></div>
        </div>
    </div>

    <div id="chat-app" class="chat-app hidden">
        <div class="chat-header">
            <span class="app-name">Кимпиньтяо</span>
            <span class="current-user" id="current-user-display"></span>
            <button class="icon-btn" id="notifications-btn" title="Уведомления">🔔<span id="notifications-badge" class="badge hidden">0</span></button>
            <button class="icon-btn" id="logout-btn" title="Выйти">↪</button>
        </div>

        <div id="dynamic-content" class="tab-content"></div>

        <div class="tabs">
            <div class="tab active" data-tab="dialogs">💬</div>
            <div class="tab" data-tab="feed">📰</div>
            <div class="tab" data-tab="chat">🌍</div>
            <div class="tab" data-tab="profile">👤</div>
            <div class="tab" data-tab="settings">⚙️</div>
        </div>
    </div>

    <div id="game-modal" class="game-modal hidden">
        <div class="game-card">
            <div style="display:flex; justify-content:space-between;">
                <span style="color:white; font-size:2rem;">🎮</span>
                <button class="icon-btn" id="close-game" style="width:40px;height:40px;">✕</button>
            </div>
            <div id="game-status" style="color:white; text-align:center; margin:15px 0;">Крестики-нолики</div>
            <div class="game-board" id="game-board"></div>
            <button class="action-btn" id="reset-game" style="width:100%;">Новая игра</button>
        </div>
    </div>

    <div id="call-modal" class="call-modal hidden">
        <div class="game-card" style="max-width:400px;">
            <div style="display:flex; justify-content:space-between;">
                <span style="color:white; font-size:2rem;">📞</span>
                <button class="icon-btn" id="close-call-modal" style="width:40px;height:40px;">✕</button>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:15px 0;">
                <div style="background:#1e293b; border-radius:30px; aspect-ratio:1/1; overflow:hidden;">
                    <video id="local-video" autoplay muted playsinline style="width:100%; height:100%; object-fit:cover;"></video>
                </div>
                <div id="remote-video-container" style="background:#1e293b; border-radius:30px; display:flex; align-items:center; justify-content:center; color:#94a3b8;">👤 Ожидание...</div>
            </div>
            <div style="display:flex; gap:15px; justify-content:center;">
                <button class="circle-btn" id="toggle-video" style="width:55px;height:55px;">📹</button>
                <button class="circle-btn" id="toggle-audio" style="width:55px;height:55px;">🎤</button>
                <button class="circle-btn" id="end-call-btn" style="background:#c74b4b; width:55px;height:55px;">📴</button>
            </div>
        </div>
    </div>

    <div id="notifications-modal" class="notifications-modal hidden">
        <div class="notifications-card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <span style="color:white; font-size:1.8rem;">🔔 Уведомления</span>
                <button class="icon-btn" id="close-notifications" style="width:40px;height:40px;">✕</button>
            </div>
            <div id="notifications-list" style="color:white;"></div>
        </div>
    </div>

    <div id="frame-modal" class="frame-modal hidden">
        <div class="frame-card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <span style="color:white; font-size:1.5rem;">🖼️ Выбор рамки</span>
                <button class="icon-btn" id="close-frame-modal" style="width:40px;height:40px;">✕</button>
            </div>
            <div id="frame-options"></div>
        </div>
    </div>

    <div id="friends-modal" class="friends-modal hidden">
        <div class="friends-card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <span style="color:white; font-size:1.5rem;">👥 Запросы в друзья</span>
                <button class="icon-btn" id="close-friends-modal" style="width:40px;height:40px;">✕</button>
            </div>
            <div id="friend-requests-list"></div>
        </div>
    </div>
</div>

    // ================== КУКИ ==================
    function setCookie(name, value, days) {
        const expires = new Date();
        expires.setTime(expires.getTime() + days * 24 * 60 * 60 * 1000);
        document.cookie = `${name}=${value};expires=${expires.toUTCString()};path=/;SameSite=Strict`;
    }
    function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
        return null;
    }
    function deleteCookie(name) {
        document.cookie = `${name}=;expires=Thu, 01 Jan 1970 00:00:00 UTC;path=/`;
    }

    // ================== ВСПОМОГАТЕЛЬНЫЕ ==================
    function escapeHtml(unsafe) {
        if (!unsafe) return '';
        return unsafe.replace(/[&<>]/g, m => {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }
    function timeAgo(timestamp) {
        const diff = Date.now() - timestamp;
        if (diff < 60000) return 'только что';
        if (diff < 3600000) return Math.floor(diff/60000)+' мин назад';
        if (diff < 86400000) return Math.floor(diff/3600000)+' ч назад';
        return new Date(timestamp).toLocaleDateString();
    }

        };

    }

            <div class="avatar-wrapper ${frameClass}" style="width:${size}px; height:${size}px; cursor:pointer;" ${clickAttr}>
